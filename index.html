ignificant discount on each unit.", "chinese": "如果你批量购买，每件可以享受很大的折扣。"}, {"id": 1377, "category": "购物与消费", "type": "日常口语", "english": "She's been trying to pay off her credit card debt little by little every month.", "chinese": "她一直在每个月一点一点地还信用卡债务。"}, {"id": 1378, "category": "购物与消费", "type": "日常口语", "english": "I was pleasantly surprised by the quality of the product that I bought at such a low price.", "chinese": "我以这么低的价格买到的产品质量让我感到惊喜。"}, {"id": 1379, "category": "购物与消费", "type": "日常口语", "english": "The more expensive option isn't always better, so you should compare the features carefully.", "chinese": "更贵的选项不一定更好，所以你应该仔细比较功能。"}, {"id": 1380, "category": "购物与消费", "type": "日常口语", "english": "We need to figure out how much we've spent so far this month before we go shopping again.", "chinese": "在再次购物之前，我们需要算算这个月已经花了多少钱。"}, {"id": 1381, "category": "购物与消费", "type": "日常口语", "english": "I've been keeping an eye on this product for weeks, waiting for the price to drop.", "chinese": "我关注这个产品好几个星期了，等着降价。"}, {"id": 1382, "category": "购物与消费", "type": "日常口语", "english": "The shop owner gave me a free sample to try before I decided to buy the full-sized product.", "chinese": "店主给了我一个免费试用装，让我在决定购买正装之前先试试。"}, {"id": 1383, "category": "购物与消费", "type": "日常口语", "english": "If you're not happy with your purchase, you can always exchange it for something else.", "chinese": "如果你对购买的东西不满意，随时可以换别的。"}, {"id": 1384, "category": "购物与消费", "type": "日常口语", "english": "She ended up returning half of the things she bought during the sale because they didn't fit.", "chinese": "她最终把打折时买的一半东西都退了，因为不合适。"}, {"id": 1385, "category": "购物与消费", "type": "日常口语", "english": "I can't believe how much prices have gone up since the beginning of the year.", "chinese": "真不敢相信自年初以来物价涨了多少。"}, {"id": 1386, "category": "购物与消费", "type": "日常口语", "english": "The product that was delivered to my door was damaged, so I had to file a complaint.", "chinese": "送到我家门口的产品是损坏的，所以我不得不投诉。"}, {"id": 1387, "category": "购物与消费", "type": "日常口语", "english": "He's been known to spend hours reading product reviews before making even a small purchase.", "chinese": "大家都知道他在做一个小小的购买决定之前都会花好几个小时看产品评论。"}, {"id": 1388, "category": "购物与消费", "type": "日常口语", "english": "I wish I had listened to my friend who warned me not to buy from that shady website.", "chinese": "我真希望我听了朋友的劝告，不要在那个可疑的网站上买东西。"}, {"id": 1389, "category": "购物与消费", "type": "日常口语", "english": "The store has a policy that all sale items are final sale and cannot be returned.", "chinese": "这家店规定所有打折商品都是最终售出，不能退货。"}, {"id": 1390, "category": "购物与消费", "type": "日常口语", "english": "We should take advantage of the cashback offer before it expires at the end of the month.", "chinese": "我们应该在月底到期之前利用好返现优惠。"}, {"id": 1391, "category": "购物与消费", "type": "日常口语", "english": "I've been trying to find a store that sells organic produce at reasonable prices.", "chinese": "我一直在找一家以合理价格销售有机农产品的商店。"}, {"id": 1392, "category": "购物与消费", "type": "日常口语", "english": "She was able to get a full refund after she explained the problem to the customer service representative.", "chinese": "她向客服代表说明了问题后，成功获得了全额退款。"}, {"id": 1393, "category": "购物与消费", "type": "日常口语", "english": "If I had known how useful this gadget would be, I would have bought it much sooner.", "chinese": "如果我知道这个小玩意会这么有用，我早就买了。"}, {"id": 1394, "category": "购物与消费", "type": "日常口语", "english": "The price tag on this item doesn't match what the register is charging.", "chinese": "这个商品上的标价和收银台收的价格不一致。"}, {"id": 1395, "category": "购物与消费", "type": "日常口语", "english": "I always check my bank statements to make sure there aren't any unauthorized charges.", "chinese": "我总是检查银行对账单，确保没有未经授权的扣款。"}, {"id": 1396, "category": "购物与消费", "type": "日常口语", "english": "She talked her husband into letting her buy the expensive designer bag.", "chinese": "她说服了丈夫让她买那个昂贵的设计师款包。"}, {"id": 1397, "category": "购物与消费", "type": "日常口语", "english": "The best time to buy winter clothes is at the end of the season when everything is marked down.", "chinese": "买冬装的最佳时机是季末，所有东西都在打折。"}, {"id": 1398, "category": "购物与消费", "type": "日常口语", "english": "I've never been one to chase after brand names just for the sake of showing off.", "chinese": "我从不是为了炫耀而追逐名牌的那种人。"}, {"id": 1399, "category": "购物与消费", "type": "日常口语", "english": "If you want to save money, you should steer clear of the stores in the mall that target impulse buyers.", "chinese": "如果你想省钱，就应该避开商场里那些针对冲动购物者的商店。"}, {"id": 1400, "category": "购物与消费", "type": "日常口语", "english": "We need to work out a budget together so we don't end up spending more than we earn.", "chinese": "我们需要一起制定一个预算，以免最终花的比赚的多。"}, {"id": 1401, "category": "出行与交通", "type": "日常口语", "english": "I've been looking forward to this trip for months, and it's finally happening!", "chinese": "我期待这次旅行好几个月了，终于要出发了！"}, {"id": 1402, "category": "出行与交通", "type": "日常口语", "english": "If I had booked the tickets earlier, I would have gotten a much better deal.", "chinese": "如果我早点订票，就能拿到好得多的价格。"}, {"id": 1403, "category": "出行与交通", "type": "日常口语", "english": "The flight that was supposed to depart at 3 PM has been delayed by two hours.", "chinese": "原定下午3点起飞的航班延误了两个小时。"}, {"id": 1404, "category": "出行与交通", "type": "日常口语", "english": "We ended up missing our connection because the first flight was held up by bad weather.", "chinese": "因为第一趟航班被恶劣天气耽搁了，我们最终错过了转机。"}, {"id": 1405, "category": "出行与交通", "type": "日常口语", "english": "She's been packing her bags since yesterday but still hasn't figured out what to bring.", "chinese": "她从昨天就开始收拾行李了，但还是没决定好带什么。"}, {"id": 1406, "category": "出行与交通", "type": "日常口语", "english": "I can't wait to set off on this adventure and explore places I've never been to before.", "chinese": "我迫不及待地想踏上这次冒险之旅，去探索我从未去过的地方。"}, {"id": 1407, "category": "出行与交通", "type": "日常口语", "english": "The hotel that we stayed at last year has been renovated and looks much nicer now.", "chinese": "我们去年住的那家酒店已经翻新了，现在看起来好多了。"}, {"id": 1408, "category": "出行与交通", "type": "日常口语", "english": "If you want to avoid the traffic, you should set out before rush hour.", "chinese": "如果你想避开交通拥堵，应该在高峰时段之前出发。"}, {"id": 1409, "category": "出行与交通", "type": "日常口语", "english": "He's been traveling back and forth between Beijing and Shanghai for work every month.", "chinese": "他每个月为了工作在北京和上海之间来回奔波。"}, {"id": 1410, "category": "出行与交通", "type": "日常口语", "english": "We need to check in at least two hours before the flight takes off.", "chinese": "我们需要在航班起飞前至少两小时办理登机手续。"}, {"id": 1411, "category": "出行与交通", "type": "日常口语", "english": "The taxi driver who took me to the airport was very friendly and gave me some great tips.", "chinese": "载我去机场的出租车司机非常友好，还给了我一些很好的建议。"}, {"id": 1412, "category": "出行与交通", "type": "日常口语", "english": "I've never been on such a long flight before, so I'm a bit nervous.", "chinese": "我以前从未坐过这么长的航班，所以有点紧张。"}, {"id": 1413, "category": "出行与交通", "type": "日常口语", "english": "She made sure to look up all the local attractions before she arrived at her destination.", "chinese": "她在到达目的地之前确保查好了所有当地景点。"}, {"id": 1414, "category": "出行与交通", "type": "日常口语", "english": "If I had brought a map with me, I wouldn't have gotten lost in the old town.", "chinese": "如果我带了地图，就不会在老城里迷路了。"}, {"id": 1415, "category": "出行与交通", "type": "日常口语", "english": "The train that we were supposed to take broke down, so we had to find another way to get there.", "chinese": "我们原计划坐的那趟火车坏了，所以我们不得不另想办法到达那里。"}, {"id": 1416, "category": "出行与交通", "type": "日常口语", "english": "We decided to go on a road trip along the coast during the summer vacation.", "chinese": "我们决定暑假沿着海岸线自驾游。"}, {"id": 1417, "category": "出行与交通", "type": "日常口语", "english": "I've been meaning to visit that museum that everyone has been raving about.", "chinese": "我一直想去参观那个大家都在称赞的博物馆。"}, {"id": 1418, "category": "出行与交通", "type": "日常口语", "english": "The tour guide pointed out several historical landmarks that I would have missed otherwise.", "chinese": "导游指出了几个我原本会错过的历史地标。"}, {"id": 1419, "category": "出行与交通", "type": "日常口语", "english": "If you're planning to drive in a foreign country, you should get an international driver's license.", "chinese": "如果你打算在国外开车，应该办一个国际驾照。"}, {"id": 1420, "category": "出行与交通", "type": "日常口语", "english": "She couldn't get over how beautiful the sunset was from the top of the mountain.", "chinese": "她无法忘怀从山顶看到的日落有多美。"}, {"id": 1421, "category": "出行与交通", "type": "日常口语", "english": "We need to make a reservation at the restaurant before we head out tonight.", "chinese": "我们今晚出门前需要先在餐厅预订。"}, {"id": 1422, "category": "出行与交通", "type": "日常口语", "english": "The bus that goes to the airport runs every thirty minutes during peak hours.", "chinese": "去机场的公交车在高峰时段每三十分钟一班。"}, {"id": 1423, "category": "出行与交通", "type": "日常口语", "english": "I've been trying to get hold of the travel agency to confirm my booking.", "chinese": "我一直在联系旅行社确认我的预订。"}, {"id": 1424, "category": "出行与交通", "type": "日常口语", "english": "He ended up staying at a charming little hotel that he found on a travel website.", "chinese": "他最终住了一家他在旅游网站上找到的迷人的小酒店。"}, {"id": 1425, "category": "出行与交通", "type": "日常口语", "english": "If I were you, I'd take the scenic route instead of the highway.", "chinese": "如果我是你，我会走风景路线而不是高速公路。"}, {"id": 1426, "category": "出行与交通", "type": "日常口语", "english": "The view from the hotel balcony took my breath away the moment I stepped outside.", "chinese": "我走到酒店阳台的那一刻，眼前的景色让我叹为观止。"}, {"id": 1427, "category": "出行与交通", "type": "日常口语", "english": "She's been keeping a travel journal to document all the places she's visited.", "chinese": "她一直在写旅行日记，记录她去过的地方。"}, {"id": 1428, "category": "出行与交通", "type": "日常口语", "english": "We got stuck in traffic for over an hour on our way to the airport.", "chinese": "我们在去机场的路上堵车堵了一个多小时。"}, {"id": 1429, "category": "出行与交通", "type": "日常口语", "english": "The passport that I thought I had lost was found in the pocket of my winter coat.", "chinese": "我以为我丢了的护照在冬天的外套口袋里找到了。"}, {"id": 1430, "category": "出行与交通", "type": "日常口语", "english": "I wish I had learned some basic phrases in the local language before I traveled there.", "chinese": "我真希望去那里旅行之前学一些当地语言的基本短语。"}, {"id": 1431, "category": "出行与交通", "type": "日常口语", "english": "The subway system in this city is much more efficient than the one in my hometown.", "chinese": "这个城市的地铁系统比我家乡的高效得多。"}, {"id": 1432, "category": "出行与交通", "type": "日常口语", "english": "If you want to see the northern lights, you need to travel to a place where there's very little light pollution.", "chinese": "如果你想看北极光，你需要去一个几乎没有光污染的地方。"}, {"id": 1433, "category": "出行与交通", "type": "日常口语", "english": "He's been planning this backpacking trip across Europe for over a year.", "chinese": "他策划这次横跨欧洲的背包旅行已经超过一年了。"}, {"id": 1434, "category": "出行与交通", "type": "日常口语", "english": "We should look into renting a car instead of relying on public transportation.", "chinese": "我们应该考虑租车，而不是依赖公共交通。"}, {"id": 1435, "category": "出行与交通", "type": "日常口语", "english": "The flight attendant who was assigned to our section was incredibly helpful and polite.", "chinese": "负责我们那片区域的空乘人员非常乐于助人而且有礼貌。"}, {"id": 1436, "category": "出行与交通", "type": "日常口语", "english": "I can't figure out how to navigate this city's public transit system.", "chinese": "我搞不懂怎么使用这个城市的公共交通系统。"}, {"id": 1437, "category": "出行与交通", "type": "日常口语", "english": "She's been to more than thirty countries, which makes her the most well-traveled person I know.", "chinese": "她去过三十多个国家，是我认识的人中旅行最多的。"}, {"id": 1438, "category": "出行与交通", "type": "日常口语", "english": "If we leave now, we should be able to make it to the station before the last train departs.", "chinese": "如果我们现在出发，应该能在最后一班火车出发前赶到车站。"}, {"id": 1439, "category": "出行与交通", "type": "日常口语", "english": "The hotel where we're staying offers a complimentary breakfast that's included in the room rate.", "chinese": "我们住的酒店提供包含在房费内的免费早餐。"}, {"id": 1440, "category": "出行与交通", "type": "日常口语", "english": "We need to fill up the gas tank before we hit the road tomorrow morning.", "chinese": "我们明天早上上路之前需要加满油。"}, {"id": 1441, "category": "出行与交通", "type": "日常口语", "english": "I've been putting off renewing my passport, and now it might not arrive in time for my trip.", "chinese": "我一直拖着没换护照，现在可能赶不上我的旅行了。"}, {"id": 1442, "category": "出行与交通", "type": "日常口语", "english": "The scenic spot that was recommended by the locals turned out to be the highlight of our trip.", "chinese": "当地人推荐的那个景点结果成了我们旅行中最大的亮点。"}, {"id": 1443, "category": "出行与交通", "type": "日常口语", "english": "If I had known the weather would be this bad, I would have packed warmer clothes.", "chinese": "如果我知道天气会这么差，我就会带更暖和的衣服了。"}, {"id": 1444, "category": "出行与交通", "type": "日常口语", "english": "She ran into some trouble at customs because she forgot to declare the items she had bought.", "chinese": "她在海关遇到了麻烦，因为她忘了申报购买的商品。"}, {"id": 1445, "category": "出行与交通", "type": "日常口语", "english": "The road that leads to the village is so narrow that only one car can pass at a time.", "chinese": "通往村庄的路非常窄，一次只能通过一辆车。"}, {"id": 1446, "category": "出行与交通", "type": "日常口语", "english": "We decided to take a detour to visit a small town that we had heard a lot about.", "chinese": "我们决定绕道去参观一个听说过很多的小镇。"}, {"id": 1447, "category": "出行与交通", "type": "日常口语", "english": "I've never experienced turbulence as bad as what we went through on that flight.", "chinese": "我从未经历过像那次航班上那么严重的颠簸。"}, {"id": 1448, "category": "出行与交通", "type": "日常口语", "english": "The travel agent who helped me plan my itinerary was extremely knowledgeable.", "chinese": "帮我规划行程的旅行社工作人员非常专业。"}, {"id": 1449, "category": "出行与交通", "type": "日常口语", "english": "If you want to avoid jet lag, you should try to adjust your sleep schedule a few days before your trip.", "chinese": "如果你想避免时差反应，应该在旅行前几天调整作息时间。"}, {"id": 1450, "category": "出行与交通", "type": "日常口语", "english": "He's been working as a tour guide for over ten years and knows every corner of this city.", "chinese": "他当导游已经十多年了，对这个城市的每个角落都了如指掌。"}, {"id": 1451, "category": "出行与交通", "type": "日常口语", "english": "We need to drop off the rental car before the office closes at six o'clock.", "chinese": "我们需要在六点办公室关门前还掉租车。"}, {"id": 1452, "category": "出行与交通", "type": "日常口语", "english": "The cruise that we booked stops at five different ports along the Mediterranean coast.", "chinese": "我们预订的邮轮在地中海沿岸停靠五个不同的港口。"}, {"id": 1453, "category": "出行与交通", "type": "日常口语", "english": "I can't help but feel excited every time I step into an airport.", "chinese": "每次走进机场，我都忍不住感到兴奋。"}, {"id": 1454, "category": "出行与交通", "type": "日常口语", "english": "She made up her mind to travel solo after her friend backed out at the last minute.", "chinese": "她的朋友最后一刻退出后，她决定独自旅行。"}, {"id": 1455, "category": "出行与交通", "type": "日常口语", "english": "If I had more time, I would have explored the countryside instead of just staying in the city.", "chinese": "如果我有更多时间，我就会去探索乡村，而不是只待在城市里。"}, {"id": 1456, "category": "出行与交通", "type": "日常口语", "english": "The bridge that connects the two islands was built over a hundred years ago.", "chinese": "连接两个岛屿的那座桥是一百多年前建造的。"}, {"id": 1457, "category": "出行与交通", "type": "日常口语", "english": "We've been driving for six hours straight, and I think we need to pull over and take a break.", "chinese": "我们已经连续开了六个小时的车了，我觉得需要靠边停车休息一下。"}, {"id": 1458, "category": "出行与交通", "type": "日常口语", "english": "The luggage that I checked in at the airport was damaged during the flight.", "chinese": "我在机场托运的行李在飞行中被损坏了。"}, {"id": 1459, "category": "出行与交通", "type": "日常口语", "english": "I wish I had brought a power adapter because the outlets here are different from the ones at home.", "chinese": "我真希望我带了电源转换器，因为这里的插座和家里的不一样。"}, {"id": 1460, "category": "出行与交通", "type": "日常口语", "english": "She's been telling everyone about the amazing trip she took to Japan last spring.", "chinese": "她一直在跟每个人讲述她去年春天去日本的精彩旅行。"}, {"id": 1461, "category": "出行与交通", "type": "日常口语", "english": "The best way to get around this city is by bike, which is what most of the locals do.", "chinese": "在这个城市出行最好的方式是骑自行车，这也是大多数当地人的做法。"}, {"id": 1462, "category": "出行与交通", "type": "日常口语", "english": "If you don't hurry up, we're going to miss the train that leaves in ten minutes.", "chinese": "如果你不快点，我们就要赶不上十分钟后出发的那趟火车了。"}, {"id": 1463, "category": "出行与交通", "type": "日常口语", "english": "He couldn't find his boarding pass anywhere, which caused a lot of stress at the airport.", "chinese": "他到处都找不到登机牌，这在机场引起了很多焦虑。"}, {"id": 1464, "category": "出行与交通", "type": "日常口语", "english": "We should make the most of our time here since we're only staying for three days.", "chinese": "我们既然只待三天，就应该充分利用在这里的时间。"}, {"id": 1465, "category": "出行与交通", "type": "日常口语", "english": "The museum that we visited yesterday was much more impressive than I had expected.", "chinese": "我们昨天参观的博物馆比我预想的要令人印象深刻得多。"}, {"id": 1466, "category": "出行与交通", "type": "日常口语", "english": "I've been keeping all my boarding passes as souvenirs from the places I've traveled to.", "chinese": "我一直把所有的登机牌留着，作为去过的地方的纪念。"}, {"id": 1467, "category": "出行与交通", "type": "日常口语", "english": "She talked her friends into going on a hiking trip instead of just lying on the beach.", "chinese": "她说服朋友们去徒步旅行，而不是只在海滩上躺着。"}, {"id": 1468, "category": "出行与交通", "type": "日常口语", "english": "If it hadn't rained so heavily, the view from the mountaintop would have been spectacular.", "chinese": "如果不是雨下得那么大，山顶的景色一定会非常壮观。"}, {"id": 1469, "category": "出行与交通", "type": "日常口语", "english": "The hotel receptionist was kind enough to help us book a taxi to the train station.", "chinese": "酒店前台很热心地帮我们预约了去火车站的出租车。"}, {"id": 1470, "category": "出行与交通", "type": "日常口语", "english": "We need to work out a detailed itinerary before we start our trip so we don't waste any time.", "chinese": "我们需要在出发前制定一个详细的行程表，这样就不会浪费时间。"}, {"id": 1471, "category": "出行与交通", "type": "日常口语", "english": "I've always wanted to go on a cross-country train ride across the United States.", "chinese": "我一直想坐火车横穿美国。"}, {"id": 1472, "category": "出行与交通", "type": "日常口语", "english": "The driver who picked us up from the airport was very talkative and told us about the city's history.", "chinese": "来机场接我们的司机很健谈，给我们讲了这座城市的历史。"}, {"id": 1473, "category": "出行与交通", "type": "日常口语", "english": "If you want to experience the local culture, you should stay in a homestay instead of a hotel.", "chinese": "如果你想体验当地文化，应该住在民宿而不是酒店。"}, {"id": 1474, "category": "出行与交通", "type": "日常口语", "english": "She ended up extending her stay by another week because she was having such a wonderful time.", "chinese": "她玩得太开心了，最终把行程又延长了一周。"}, {"id": 1475, "category": "出行与交通", "type": "日常口语", "english": "The travel app that I downloaded has been incredibly useful for finding cheap flights.", "chinese": "我下载的旅行应用在找便宜机票方面非常有用。"}, {"id": 1476, "category": "出行与交通", "type": "日常口语", "english": "We got caught in a sudden thunderstorm while we were hiking in the mountains.", "chinese": "我们在山里徒步的时候遇到了一场突如其来的雷暴。"}, {"id": 1477, "category": "出行与交通", "type": "日常口语", "english": "I can't believe how much the cost of airfare has gone up since last year.", "chinese": "真不敢相信自去年以来机票价格涨了多少。"}, {"id": 1478, "category": "出行与交通", "type": "日常口语", "english": "She's been saving up her vacation days so she can take a long trip next summer.", "chinese": "她一直在攒假期，这样明年夏天就能去长途旅行了。"}, {"id": 1479, "category": "出行与交通", "type": "日常口语", "english": "If you're traveling with kids, you should make sure to pack plenty of snacks and entertainment.", "chinese": "如果你带孩子旅行，应该确保带够零食和娱乐用品。"}, {"id": 1480, "category": "出行与交通", "type": "日常口语", "english": "The sunset that we watched from the beach was the most beautiful one I've ever seen.", "chinese": "我们在海滩上看的日落是我见过的最美的。"}, {"id": 1481, "category": "出行与交通", "type": "日常口语", "english": "We need to figure out the best route to take before we set off tomorrow morning.", "chinese": "我们需要在明天早上出发前弄清楚最佳路线。"}, {"id": 1482, "category": "出行与交通", "type": "日常口语", "english": "I've been on dozens of flights, but I still get a little nervous during takeoff.", "chinese": "我已经坐过几十次航班了，但起飞时还是有点紧张。"}, {"id": 1483, "category": "出行与交通", "type": "日常口语", "english": "The local food that we tried at the night market was absolutely delicious.", "chinese": "我们在夜市尝的当地美食真的非常好吃。"}, {"id": 1484, "category": "出行与交通", "type": "日常口语", "english": "If I had brought my camera, I would have taken hundreds of photos of the scenery.", "chinese": "如果我带了相机，我就会拍几百张风景照了。"}, {"id": 1485, "category": "出行与交通", "type": "日常口语", "english": "She couldn't get used to driving on the left side of the road when she visited England.", "chinese": "她去英国旅行时无法习惯靠左行驶。"}, {"id": 1486, "category": "出行与交通", "type": "日常口语", "english": "The travel insurance that we bought covered all of our medical expenses during the trip.", "chinese": "我们买的旅行保险涵盖了旅行期间所有的医疗费用。"}, {"id": 1487, "category": "出行与交通", "type": "日常口语", "english": "We should check the weather forecast before we head out so we can dress appropriately.", "chinese": "我们出门前应该查看天气预报，这样好穿合适的衣服。"}, {"id": 1488, "category": "出行与交通", "type": "日常口语", "english": "I've been meaning to ask you how your trip to Thailand was.", "chinese": "我一直想问问你的泰国之旅怎么样。"}, {"id": 1489, "category": "出行与交通", "type": "日常口语", "english": "The ferry that takes tourists to the island runs three times a day.", "chinese": "载游客去岛上的渡轮每天运行三班。"}, {"id": 1490, "category": "出行与交通", "type": "日常口语", "english": "If you want to see the famous cherry blossoms, you need to visit Japan in early spring.", "chinese": "如果你想看著名的樱花，需要在早春时节去日本。"}, {"id": 1491, "category": "出行与交通", "type": "日常口语", "english": "He's been working as a pilot for fifteen years and has flown to almost every continent.", "chinese": "他当飞行员已经十五年了，飞去过几乎每个大洲。"}, {"id": 1492, "category": "出行与交通", "type": "日常口语", "english": "The old town that we wandered through was full of narrow streets and charming cafes.", "chinese": "我们漫步的老城区到处是狭窄的街道和迷人的咖啡馆。"}, {"id": 1493, "category": "出行与交通", "type": "日常口语", "english": "I wish I had done more research before I booked this hotel because it's not what I expected.", "chinese": "我真希望订这家酒店之前多做些功课，因为它和我的预期不一样。"}, {"id": 1494, "category": "出行与交通", "type": "日常口语", "english": "We decided to put off our trip until next month because of the ongoing pandemic.", "chinese": "由于持续的疫情，我们决定把旅行推迟到下个月。"}, {"id": 1495, "category": "出行与交通", "type": "日常口语", "english": "The travel blog that she writes has attracted thousands of followers from around the world.", "chinese": "她写的旅行博客吸引了来自世界各地的数千名粉丝。"}, {"id": 1496, "category": "出行与交通", "type": "日常口语", "english": "If you want to avoid the crowds, you should visit popular tourist spots early in the morning.", "chinese": "如果你想避开人群，应该在清晨去热门景点。"}, {"id": 1497, "category": "出行与交通", "type": "日常口语", "english": "She's been trying to convince her parents to go on a family vacation for years.", "chinese": "多年来她一直试图说服父母去家庭度假。"}, {"id": 1498, "category": "出行与交通", "type": "日常口语", "english": "The airport security line was so long that we almost missed our flight.", "chinese": "机场安检队伍排得那么长，我们差点错过了航班。"}, {"id": 1499, "category": "出行与交通", "type": "日常口语", "english": "I've never felt more relaxed than when I was lying on the beach listening to the waves.", "chinese": "我从未感到比躺在海滩上听海浪声更放松的时刻。"}, {"id": 1500, "category": "出行与交通", "type": "日常口语", "english": "The road trip that we took last summer was one of the best experiences of my life.", "chinese": "我们去年夏天的自驾游是我人生中最美好的经历之一。"}, {"id": 1501, "category": "饮食与健康", "type": "日常口语", "english": "I've been trying to cut down on junk food and eat more vegetables lately.", "chinese": "我最近一直在努力减少垃圾食品，多吃蔬菜。"}, {"id": 1502, "category": "饮食与健康", "type": "日常口语", "english": "The doctor who I saw yesterday told me that I need to watch what I eat.", "chinese": "我昨天看的医生告诉我要注意饮食。"}, {"id": 1503, "category": "饮食与健康", "type": "日常口语", "english": "If you keep staying up late and skipping meals, you're going to run down your health.", "chinese": "如果你继续熬夜不吃饭，你的身体会垮掉的。"}, {"id": 1504, "category": "饮食与健康", "type": "日常口语", "english": "She's been working out at the gym three times a week to stay in shape.", "chinese": "她每周在健身房锻炼三次来保持身材。"}, {"id": 1505, "category": "饮食与健康", "type": "日常口语", "english": "I can't figure out why I've been gaining weight even though I've been eating less.", "chinese": "我搞不懂为什么我吃得少了反而还在长胖。"}, {"id": 1506, "category": "饮食与健康", "type": "日常口语", "english": "The recipe that my grandmother passed down to me has been in our family for generations.", "chinese": "我奶奶传给我的食谱在我们家已经传了好几代了。"}, {"id": 1507, "category": "饮食与健康", "type": "日常口语", "english": "We ended up ordering takeout because we were too tired to cook after a long day.", "chinese": "我们最终叫了外卖，因为忙了一整天太累了不想做饭。"}, {"id": 1508, "category": "饮食与健康", "type": "日常口语", "english": "If I had known you were allergic to peanuts, I wouldn't have used peanut oil in the dish.", "chinese": "如果我知道你对花生过敏，我就不会在菜里用花生油了。"}, {"id": 1509, "category": "饮食与健康", "type": "日常口语", "english": "He's been complaining about a stomachache since he ate that spicy food at the restaurant.", "chinese": "自从在餐厅吃了那道辣菜后，他一直抱怨肚子疼。"}, {"id": 1510, "category": "饮食与健康", "type": "日常口语", "english": "I need to make an appointment with the dentist because my tooth has been bothering me for weeks.", "chinese": "我需要预约看牙医，因为我的牙已经疼了好几个星期了。"}, {"id": 1511, "category": "饮食与健康", "type": "日常口语", "english": "The meal that was served at the wedding reception was absolutely delicious.", "chinese": "婚宴上供应的那顿饭真的非常好吃。"}, {"id": 1512, "category": "饮食与健康", "type": "日常口语", "english": "She's been reading up on nutrition so she can make healthier choices when she eats out.", "chinese": "她一直在学习营养知识，这样在外面吃饭时可以做出更健康的选择。"}, {"id": 1513, "category": "饮食与健康", "type": "日常口语", "english": "If you want to build muscle, you need to take in more protein and exercise regularly.", "chinese": "如果你想增肌，就需要摄入更多蛋白质并坚持锻炼。"}, {"id": 1514, "category": "饮食与健康", "type": "日常口语", "english": "I've never been a big fan of seafood, but I tried sushi for the first time and loved it.", "chinese": "我一直不太喜欢海鲜，但第一次尝试寿司后就爱上了。"}, {"id": 1515, "category": "饮食与健康", "type": "日常口语", "english": "The doctor recommended that I cut out sugar from my diet to improve my overall health.", "chinese": "医生建议我从饮食中戒掉糖来改善整体健康。"}, {"id": 1516, "category": "饮食与健康", "type": "日常口语", "english": "We should eat more fruits and vegetables to keep our immune system strong.", "chinese": "我们应该多吃水果和蔬菜来保持免疫系统强健。"}, {"id": 1517, "category": "饮食与健康", "type": "日常口语", "english": "She came down with a bad cold last week and has been bedridden ever since.", "chinese": "她上周得了重感冒，从那以后就一直卧床不起。"}, {"id": 1518, "category": "饮食与健康", "type": "日常口语", "english": "If I had gone to bed earlier last night, I wouldn't feel so exhausted today.", "chinese": "如果我昨晚早点睡觉，今天就不会这么累了。"}, {"id": 1519, "category": "饮食与健康", "type": "日常口语", "english": "The restaurant that just opened down the street is supposed to have amazing Italian food.", "chinese": "街角刚开的那家餐厅据说意大利菜非常棒。"}, {"id": 1520, "category": "饮食与健康", "type": "日常口语", "english": "I've been meaning to try out that new recipe I found on the cooking website.", "chinese": "我一直想试试我在烹饪网站上找到的那个新食谱。"}, {"id": 1521, "category": "饮食与健康", "type": "日常口语", "english": "He's been dealing with high blood pressure for years and has to take medication every day.", "chinese": "他多年来一直患有高血压，每天都要吃药。"}, {"id": 1522, "category": "饮食与健康", "type": "日常口语", "english": "The food that was left out overnight should be thrown away because it's gone bad.", "chinese": "放了一夜的食物应该扔掉，因为已经坏了。"}, {"id": 1523, "category": "饮食与健康", "type": "日常口语", "english": "If you're feeling under the weather, you should stay home and get some rest.", "chinese": "如果你感觉不舒服，应该待在家里休息。"}, {"id": 1524, "category": "饮食与健康", "type": "日常口语", "english": "She's been trying to get into the habit of drinking at least eight glasses of water a day.", "chinese": "她一直在努力养成每天至少喝八杯水的习惯。"}, {"id": 1525, "category": "饮食与健康", "type": "日常口语", "english": "I can't believe how much better I feel after I gave up drinking soda.", "chinese": "真不敢相信戒掉汽水后我感觉好了多少。"}, {"id": 1526, "category": "饮食与健康", "type": "日常口语", "english": "The nurse who took my blood pressure said it was a little higher than normal.", "chinese": "给我量血压的护士说比正常值稍微高了一点。"}, {"id": 1527, "category": "饮食与健康", "type": "日常口语", "english": "We need to stock up on fresh produce before the grocery store closes.", "chinese": "我们需要在杂货店关门前囤好新鲜农产品。"}, {"id": 1528, "category": "饮食与健康", "type": "日常口语", "english": "If you want to lose weight, you should combine a healthy diet with regular exercise.", "chinese": "如果你想减肥，应该把健康饮食和规律运动结合起来。"}, {"id": 1529, "category": "饮食与健康", "type": "日常口语", "english": "He's been going to yoga classes every morning to help with his back pain.", "chinese": "他每天早上都去上瑜伽课来缓解背痛。"}, {"id": 1530, "category": "饮食与健康", "type": "日常口语", "english": "The soup that my mom makes whenever I'm sick always makes me feel better.", "chinese": "每次我生病时妈妈做的汤总能让我感觉好一些。"}, {"id": 1531, "category": "饮食与健康", "type": "日常口语", "english": "I've been suffering from insomnia for the past few weeks and it's really affecting my daily life.", "chinese": "过去几周我一直失眠，这真的影响了我的日常生活。"}, {"id": 1532, "category": "饮食与健康", "type": "日常口语", "english": "She's been known to whip up a delicious meal from whatever is left in the fridge.", "chinese": "大家都知道她能用冰箱里剩下的任何东西做出一顿美味的饭菜。"}, {"id": 1533, "category": "饮食与健康", "type": "日常口语", "english": "If I had eaten breakfast this morning, I wouldn't be so hungry right now.", "chinese": "如果我今天早上吃了早饭，现在就不会这么饿了。"}, {"id": 1534, "category": "饮食与健康", "type": "日常口语", "english": "The doctor advised me to cut back on caffeine because it was affecting my sleep.", "chinese": "医生建议我减少咖啡因的摄入，因为它影响了我的睡眠。"}, {"id": 1535, "category": "饮食与健康", "type": "日常口语", "english": "We decided to go on a diet together to support each other in reaching our health goals.", "chinese": "我们决定一起节食，互相支持实现健康目标。"}, {"id": 1536, "category": "饮食与健康", "type": "日常口语", "english": "I've been experimenting with different spices to add more flavor to my cooking.", "chinese": "我一直在尝试不同的香料，给烹饪增添更多风味。"}, {"id": 1537, "category": "饮食与健康", "type": "日常口语", "english": "The hospital that was built last year is much better equipped than the old one.", "chinese": "去年建的那家医院比旧医院设备好得多。"}, {"id": 1538, "category": "饮食与健康", "type": "日常口语", "english": "If you don't slow down and take care of yourself, you'll end up in the hospital.", "chinese": "如果你不放慢脚步照顾好自己，最终会进医院的。"}, {"id": 1539, "category": "饮食与健康", "type": "日常口语", "english": "She's been taking vitamins every morning to boost her immune system during flu season.", "chinese": "她在流感季节每天早上服用维生素来增强免疫力。"}, {"id": 1540, "category": "饮食与健康", "type": "日常口语", "english": "I can't eat anything that contains gluten because I was diagnosed with celiac disease last year.", "chinese": "我不能吃任何含麸质的东西，因为我去年被诊断出患有乳糜泻。"}, {"id": 1541, "category": "饮食与健康", "type": "日常口语", "english": "The meal that we had at the French restaurant was the best one I've had all year.", "chinese": "我们在那家法国餐厅吃的饭是我今年吃过最好的一顿。"}, {"id": 1542, "category": "饮食与健康", "type": "日常口语", "english": "He's been trying to quit smoking for years but keeps falling off the wagon.", "chinese": "他多年来一直试图戒烟，但总是反复。"}, {"id": 1543, "category": "饮食与健康", "type": "日常口语", "english": "If you want to stay healthy, you need to make sure you're getting enough sleep every night.", "chinese": "如果你想保持健康，需要确保每晚有足够的睡眠。"}, {"id": 1544, "category": "饮食与健康", "type": "日常口语", "english": "We should sign up for a cooking class so we can learn how to make healthier meals.", "chinese": "我们应该报名参加烹饪课，学习如何做更健康的饭菜。"}, {"id": 1545, "category": "饮食与健康", "type": "日常口语", "english": "I've been feeling a lot more energetic since I started exercising regularly.", "chinese": "自从我开始规律运动以来，感觉精力充沛多了。"}, {"id": 1546, "category": "饮食与健康", "type": "日常口语", "english": "The doctor who performed the surgery said the operation was a complete success.", "chinese": "做手术的医生说手术非常成功。"}, {"id": 1547, "category": "饮食与健康", "type": "日常口语", "english": "She's been dealing with a lot of stress at work, which has started to take a toll on her health.", "chinese": "她一直在应对工作中的很多压力，这已经开始影响她的健康了。"}, {"id": 1548, "category": "饮食与健康", "type": "日常口语", "english": "If I had listened to my doctor's advice, I would have recovered much faster.", "chinese": "如果我听了医生的建议，恢复得会快得多。"}, {"id": 1549, "category": "饮食与健康", "type": "日常口语", "english": "The bakery that we pass by every morning smells absolutely wonderful.", "chinese": "我们每天早上经过的那家面包店闻起来真的太香了。"}, {"id": 1550, "category": "饮食与健康", "type": "日常口语", "english": "I need to cut back on the amount of salt I use in my cooking.", "chinese": "我需要减少烹饪中盐的用量。"}, {"id": 1551, "category": "饮食与健康", "type": "日常口语", "english": "He's been running five kilometers every morning to prepare for the upcoming marathon.", "chinese": "他每天早上跑五公里来为即将到来的马拉松做准备。"}, {"id": 1552, "category": "饮食与健康", "type": "日常口语", "english": "The food that was served at the buffet was so good that I went back for seconds.", "chinese": "自助餐供应的食物太好吃了，我又去盛了第二盘。"}, {"id": 1553, "category": "饮食与健康", "type": "日常口语", "english": "If you want to maintain a healthy weight, you should avoid eating late at night.", "chinese": "如果你想保持健康体重，应该避免深夜进食。"}, {"id": 1554, "category": "饮食与健康", "type": "日常口语", "english": "She's been keeping a food diary to track everything she eats during the day.", "chinese": "她一直在记饮食日记，记录白天吃的所有东西。"}, {"id": 1555, "category": "饮食与健康", "type": "日常口语", "english": "I can't believe how much my eating habits have changed since I started learning about nutrition.", "chinese": "真不敢相信自从我开始学习营养知识以来，我的饮食习惯改变了多少。"}, {"id": 1556, "category": "饮食与健康", "type": "日常口语", "english": "The doctor told me to lay off the fried food if I want to lower my cholesterol.", "chinese": "医生告诉我想降低胆固醇就要少吃油炸食品。"}, {"id": 1557, "category": "饮食与健康", "type": "日常口语", "english": "We need to make sure we're getting a balanced diet that includes all the essential nutrients.", "chinese": "我们需要确保饮食均衡，包含所有必需的营养素。"}, {"id": 1558, "category": "饮食与健康", "type": "日常口语", "english": "If I had known how good this restaurant was, I would have come here much sooner.", "chinese": "如果我知道这家餐厅这么好，我早就来了。"}, {"id": 1559, "category": "饮食与健康", "type": "日常口语", "english": "She's been trying to get her kids to eat more vegetables by hiding them in smoothies.", "chinese": "她一直在想办法让孩子们多吃蔬菜，把蔬菜藏在冰沙里。"}, {"id": 1560, "category": "饮食与健康", "type": "日常口语", "english": "I've been having headaches more frequently, so I think I should go see a doctor.", "chinese": "我最近头痛越来越频繁了，所以我觉得应该去看医生。"}, {"id": 1561, "category": "饮食与健康", "type": "日常口语", "english": "The dish that the chef prepared for us was a work of art on a plate.", "chinese": "厨师为我们准备的那道菜简直就是盘子上的艺术品。"}, {"id": 1562, "category": "饮食与健康", "type": "日常口语", "english": "He's been told by his doctor to give up alcohol completely because of his liver condition.", "chinese": "医生告诉他因为肝脏问题必须完全戒酒。"}, {"id": 1563, "category": "饮食与健康", "type": "日常口语", "english": "If you feel dizzy after standing up, you should sit back down and rest for a moment.", "chinese": "如果你站起来后感到头晕，应该坐回去休息一会儿。"}, {"id": 1564, "category": "饮食与健康", "type": "日常口语", "english": "We should go for a walk after dinner to help with digestion.", "chinese": "我们应该饭后散散步来帮助消化。"}, {"id": 1565, "category": "饮食与健康", "type": "日常口语", "english": "I've been meaning to ask you where you bought those fresh herbs you used in the salad.", "chinese": "我一直想问你在哪里买的沙拉里用的那些新鲜香草。"}, {"id": 1566, "category": "饮食与健康", "type": "日常口语", "english": "The health insurance that my company provides covers most of my medical expenses.", "chinese": "公司提供的医疗保险涵盖了我大部分的医疗费用。"}, {"id": 1567, "category": "饮食与健康", "type": "日常口语", "english": "She's been drinking herbal tea every night to help her relax and fall asleep more easily.", "chinese": "她每晚喝花草茶来帮助放松和更容易入睡。"}, {"id": 1568, "category": "饮食与健康", "type": "日常口语", "english": "If you want to build up your strength, you should start with light exercises and gradually increase the intensity.", "chinese": "如果你想增强体力，应该从轻度运动开始，逐渐增加强度。"}, {"id": 1569, "category": "饮食与健康", "type": "日常口语", "english": "The restaurant that we used to go to every Friday has been replaced by a fast-food chain.", "chinese": "我们以前每周五都去的那家餐厅被一家快餐连锁店取代了。"}, {"id": 1570, "category": "饮食与健康", "type": "日常口语", "english": "I need to watch my sugar intake because diabetes runs in my family.", "chinese": "我需要注意糖的摄入量，因为糖尿病在我们家是遗传的。"}, {"id": 1571, "category": "饮食与健康", "type": "日常口语", "english": "He's been feeling a lot better since he started taking the medication that was prescribed to him.", "chinese": "自从他开始服用医生开的药以来，感觉好多了。"}, {"id": 1572, "category": "饮食与健康", "type": "日常口语", "english": "The meal prep that she does every Sunday saves her a lot of time during the week.", "chinese": "她每个周日做的备餐为她工作日省了很多时间。"}, {"id": 1573, "category": "饮食与健康", "type": "日常口语", "english": "If you keep eating so much fast food, your health is going to go downhill fast.", "chinese": "如果你继续吃这么多快餐，你的健康会迅速恶化。"}, {"id": 1574, "category": "饮食与健康", "type": "日常口语", "english": "I've been trying to drink less coffee because it's been making me feel anxious.", "chinese": "我一直在努力少喝咖啡，因为它让我感到焦虑。"}, {"id": 1575, "category": "饮食与健康", "type": "日常口语", "english": "She's been learning how to cook traditional Chinese dishes from her mother-in-law.", "chinese": "她一直在跟婆婆学做传统中国菜。"}, {"id": 1576, "category": "饮食与健康", "type": "日常口语", "english": "The doctor who treated me at the emergency room was very professional and caring.", "chinese": "在急诊室给我治疗的医生非常专业和有爱心。"}, {"id": 1577, "category": "饮食与健康", "type": "日常口语", "english": "We should eat at home more often instead of always ordering delivery.", "chinese": "我们应该多在家做饭，而不是总是点外卖。"}, {"id": 1578, "category": "饮食与健康", "type": "日常口语", "english": "If I had taken better care of my teeth when I was younger, I wouldn't have so many problems now.", "chinese": "如果我年轻时更好地保护牙齿，现在就不会有这么多问题了。"}, {"id": 1579, "category": "饮食与健康", "type": "日常口语", "english": "I've been getting headaches from staring at my computer screen all day.", "chinese": "我整天盯着电脑屏幕看，搞得头疼。"}, {"id": 1580, "category": "饮食与健康", "type": "日常口语", "english": "The new diet that everyone is talking about claims to help you lose ten pounds in two weeks.", "chinese": "大家都在讨论的新饮食法声称能在两周内帮你减掉十磅。"}, {"id": 1581, "category": "饮食与健康", "type": "日常口语", "english": "She's been incorporating more whole grains into her diet for better heart health.", "chinese": "她一直在饮食中加入更多全谷物，以促进心脏健康。"}, {"id": 1582, "category": "饮食与健康", "type": "日常口语", "english": "If you're going to be out in the sun all day, you should put on sunscreen to protect your skin.", "chinese": "如果你要在太阳下待一整天，应该涂防晒霜保护皮肤。"}, {"id": 1583, "category": "饮食与健康", "type": "日常口语", "english": "The food poisoning that I got from the street vendor last week was the worst experience of my life.", "chinese": "上周我从路边摊吃到的食物中毒是我人生中最糟糕的经历。"}, {"id": 1584, "category": "饮食与健康", "type": "日常口语", "english": "I need to make a doctor's appointment because I've been feeling run down lately.", "chinese": "我需要预约看医生，因为我最近一直感觉精力不济。"}, {"id": 1585, "category": "饮食与健康", "type": "日常口语", "english": "He's been trying to talk his wife into joining the gym with him.", "chinese": "他一直在试图说服妻子和他一起去健身房。"}, {"id": 1586, "category": "饮食与健康", "type": "日常口语", "english": "The salad that I ordered was much fresher than the one I had at the other restaurant.", "chinese": "我点的沙拉比我在另一家餐厅吃的要新鲜得多。"}, {"id": 1587, "category": "饮食与健康", "type": "日常口语", "english": "If you want to boost your energy levels, you should try eating smaller meals more frequently throughout the day.", "chinese": "如果你想提高精力水平，应该尝试在一天中更频繁地吃小餐。"}, {"id": 1588, "category": "饮食与健康", "type": "日常口语", "english": "We've been buying organic produce from the farmer's market every Saturday morning.", "chinese": "我们每个周六早上都在农贸市场买有机农产品。"}, {"id": 1589, "category": "饮食与健康", "type": "日常口语", "english": "She came down with the flu right before her vacation, which was incredibly frustrating.", "chinese": "她在假期前得了流感，这让人非常沮丧。"}, {"id": 1590, "category": "饮食与健康", "type": "日常口语", "english": "I can't eat spicy food because it gives me heartburn.", "chinese": "我不能吃辣的食物，因为它让我胃灼热。"}, {"id": 1591, "category": "饮食与健康", "type": "日常口语", "english": "The nutritionist who I consulted recommended a diet that is rich in fiber and low in saturated fat.", "chinese": "我咨询的营养师推荐了一种富含纤维、低饱和脂肪的饮食。"}, {"id": 1592, "category": "饮食与健康", "type": "日常口语", "english": "If you don't stay hydrated during exercise, you could end up fainting.", "chinese": "如果你在运动时不保持水分充足，可能会晕倒。"}, {"id": 1593, "category": "饮食与健康", "type": "日常口语", "english": "I've been meaning to try that new smoothie place that opened near my office.", "chinese": "我一直想试试我办公室附近新开的那家冰沙店。"}, {"id": 1594, "category": "饮食与健康", "type": "日常口语", "english": "The surgery that he underwent last month was more complicated than the doctors had expected.", "chinese": "他上个月做的手术比医生预期的要复杂。"}, {"id": 1595, "category": "饮食与健康", "type": "日常口语", "english": "She's been making homemade bread every weekend and it tastes much better than store-bought.", "chinese": "她每个周末都在家做面包，比买的好吃多了。"}, {"id": 1596, "category": "饮食与健康", "type": "日常口语", "english": "If you want to recover quickly from your cold, you should get plenty of rest and drink lots of fluids.", "chinese": "如果你想从感冒中快速恢复，应该充分休息并多喝水。"}, {"id": 1597, "category": "饮食与健康", "type": "日常口语", "english": "We need to cut down on our intake of processed foods and eat more natural, whole foods.", "chinese": "我们需要减少加工食品的摄入，多吃天然的全食物。"}, {"id": 1598, "category": "饮食与健康", "type": "日常口语", "english": "I've been feeling much more positive since I started meditating every morning.", "chinese": "自从我开始每天早上冥想以来，感觉积极多了。"}, {"id": 1599, "category": "饮食与健康", "type": "日常口语", "english": "The dessert that was served at the end of the meal was so rich that I could only eat a few bites.", "chinese": "最后上的甜点太腻了，我只能吃几口。"}, {"id": 1600, "category": "饮食与健康", "type": "日常口语", "english": "If I had known how important regular checkups are, I would have started going to the doctor much earlier.", "chinese": "如果我知道定期体检有多重要，我早就开始看医生了。"}, {"id": 1601, "category": "家庭与情感", "type": "日常口语", "english": "I've been missing my parents a lot since I moved to another city for work.", "chinese": "自从我搬到另一个城市工作以来，我非常想念父母。"}, {"id": 1602, "category": "家庭与情感", "type": "日常口语", "english": "The relationship that I have with my sister has grown stronger over the years.", "chinese": "我和妹妹的关系这些年来越来越深厚了。"}, {"id": 1603, "category": "家庭与情感", "type": "日常口语", "english": "If I had spent more time with my grandparents when they were alive, I wouldn't feel so much regret.", "chinese": "如果祖父母在世时我多花些时间陪他们，我就不会这么遗憾了。"}, {"id": 1604, "category": "家庭与情感", "type": "日常口语", "english": "She's been trying to work things out with her husband after their big argument.", "chinese": "大吵一架之后，她一直在努力和丈夫解决问题。"}, {"id": 1605, "category": "家庭与情感", "type": "日常口语", "english": "I can't help but feel proud of my son for getting into such a prestigious university.", "chinese": "我忍不住为儿子能进入这么好的大学而感到骄傲。"}, {"id": 1606, "category": "家庭与情感", "type": "日常口语", "english": "The news that my daughter got engaged brought tears of joy to my eyes.", "chinese": "女儿订婚的消息让我流下了喜悦的泪水。"}, {"id": 1607, "category": "家庭与情感", "type": "日常口语", "english": "We ended up having a long heart-to-heart talk that really cleared the air between us.", "chinese": "我们最终进行了一次深入的谈心，真的消除了我们之间的误会。"}, {"id": 1608, "category": "家庭与情感", "type": "日常口语", "english": "If you keep bottling up your emotions, they're going to build up and explode one day.", "chinese": "如果你一直压抑自己的情绪，它们总有一天会积累到爆发的程度。"}, {"id": 1609, "category": "家庭与情感", "type": "日常口语", "english": "He's been feeling overwhelmed by all the responsibilities that come with being a new parent.", "chinese": "作为新手父母，他一直感到被所有责任压得喘不过气来。"}, {"id": 1610, "category": "家庭与情感", "type": "日常口语", "english": "I need to make more of an effort to stay in touch with my extended family.", "chinese": "我需要更加努力地和亲戚们保持联系。"}, {"id": 1611, "category": "家庭与情感", "type": "日常口语", "english": "The support that my family gave me during my divorce helped me get through the toughest time of my life.", "chinese": "离婚期间家人给予我的支持帮我度过了人生中最艰难的时期。"}, {"id": 1612, "category": "家庭与情感", "type": "日常口语", "english": "She's been worried sick about her father who was recently diagnosed with a serious illness.", "chinese": "她父亲最近被诊断出患有重病，她担心得要命。"}, {"id": 1613, "category": "家庭与情感", "type": "日常口语", "english": "If I had been more patient with my children when they were growing up, our relationship would be better now.", "chinese": "如果我在孩子们成长过程中更有耐心，我们现在的关系会更好。"}, {"id": 1614, "category": "家庭与情感", "type": "日常口语", "english": "I've always looked up to my older brother because he's always been there for me when I needed him.", "chinese": "我一直很敬仰我的哥哥，因为每当我需要他的时候，他总是在我身边。"}, {"id": 1615, "category": "家庭与情感", "type": "日常口语", "english": "The family gathering that we organized last Thanksgiving was one of the best memories I have.", "chinese": "我们去年感恩节组织的家庭聚会是我最美好的回忆之一。"}, {"id": 1616, "category": "家庭与情感", "type": "日常口语", "english": "We need to set aside some quality time for each other instead of always being busy with work.", "chinese": "我们需要为彼此留出一些高质量的时间，而不是总是忙于工作。"}, {"id": 1617, "category": "家庭与情感", "type": "日常口语", "english": "She's been going through a tough time emotionally since she broke up with her boyfriend.", "chinese": "自从和男朋友分手后，她一直情绪低落。"}, {"id": 1618, "category": "家庭与情感", "type": "日常口语", "english": "If you want your children to open up to you, you need to create a safe and non-judgmental environment.", "chinese": "如果你想让孩子对你敞开心扉，你需要创造一个安全、不带评判的环境。"}, {"id": 1619, "category": "家庭与情感", "type": "日常口语", "english": "I can't put into words how grateful I am for everything my parents have done for me.", "chinese": "我无法用言语表达我对父母为我所做的一切有多么感激。"}, {"id": 1620, "category": "家庭与情感", "type": "日常口语", "english": "The bond that exists between a mother and her child is unlike any other relationship in the world.", "chinese": "母亲和孩子之间的纽带是世界上任何其他关系都无法比拟的。"}, {"id": 1621, "category": "家庭与情感", "type": "日常口语", "english": "He's been trying to make up for lost time with his children after being away on business for months.", "chinese": "出差几个月后，他一直在努力弥补与孩子们失去的时光。"}, {"id": 1622, "category": "家庭与情感", "type": "日常口语", "english": "I wish I had told my mom how much I love her before she passed away.", "chinese": "我真希望妈妈去世前我告诉她我有多爱她。"}, {"id": 1623, "category": "家庭与情感", "type": "日常口语", "english": "We should sit down and have a serious talk about our future together.", "chinese": "我们应该坐下来认真谈谈我们的未来。"}, {"id": 1624, "category": "家庭与情感", "type": "日常口语", "english": "The argument that started over something trivial blew up into a huge fight.", "chinese": "从一件小事开始的争吵升级成了一场大吵。"}, {"id": 1625, "category": "家庭与情感", "type": "日常口语", "english": "If I had handled the situation differently, my daughter wouldn't have been so upset.", "chinese": "如果我换一种方式处理那个情况，我女儿就不会那么难过了。"}, {"id": 1626, "category": "家庭与情感", "type": "日常口语", "english": "She's been leaning on her best friend for emotional support during her divorce.", "chinese": "离婚期间她一直依靠闺蜜来获得情感支持。"}, {"id": 1627, "category": "家庭与情感", "type": "日常口语", "english": "I've been feeling a bit down lately, but talking to my mom always cheers me up.", "chinese": "我最近情绪有些低落，但和妈妈聊天总能让我开心起来。"}, {"id": 1628, "category": "家庭与情感", "type": "日常口语", "english": "The children who grow up in a loving and supportive environment tend to be more confident.", "chinese": "在充满爱和支持的环境中长大的孩子往往更自信。"}, {"id": 1629, "category": "家庭与情感", "type": "日常口语", "english": "We need to learn to let go of the past and focus on building a better future together.", "chinese": "我们需要学会放下过去，专注于共同建设更好的未来。"}, {"id": 1630, "category": "家庭与情感", "type": "日常口语", "english": "He couldn't hold back his tears when his daughter walked across the stage at her graduation.", "chinese": "当女儿在毕业典礼上走过舞台时，他忍不住流下了眼泪。"}, {"id": 1631, "category": "家庭与情感", "type": "日常口语", "english": "I've been trying to be a better listener when my spouse talks about their feelings.", "chinese": "当配偶谈论他们的感受时，我一直在努力做一个更好的倾听者。"}, {"id": 1632, "category": "家庭与情感", "type": "日常口语", "english": "The family tradition that we've kept alive for generations is something I cherish deeply.", "chinese": "我们世代相传的家庭传统是我深深珍视的东西。"}, {"id": 1633, "category": "家庭与情感", "type": "日常口语", "english": "If you want to build trust in a relationship, you need to be honest and transparent.", "chinese": "如果你想建立关系中的信任，你需要诚实和透明。"}, {"id": 1634, "category": "家庭与情感", "type": "日常口语", "english": "She's been feeling guilty about not spending enough time with her aging parents.", "chinese": "她因为没有花足够的时间陪伴年迈的父母而感到内疚。"}, {"id": 1635, "category": "家庭与情感", "type": "日常口语", "english": "I can tell that something has been bothering you lately, and I'm here if you want to talk about it.", "chinese": "我看得出来你最近有什么心事，如果你想聊聊，我在这里。"}, {"id": 1636, "category": "家庭与情感", "type": "日常口语", "english": "The moment when I held my newborn baby for the first time was the happiest moment of my life.", "chinese": "我第一次抱着刚出生的宝宝的那一刻是我人生中最幸福的时刻。"}, {"id": 1637, "category": "家庭与情感", "type": "日常口语", "english": "We've been through a lot together, and that's what makes our relationship so strong.", "chinese": "我们一起经历了很多，正是这些让我们的关系如此牢固。"}, {"id": 1638, "category": "家庭与情感", "type": "日常口语", "english": "If I had known how much my words hurt you, I would have never said them.", "chinese": "如果我知道我的话有多伤你，我绝不会说的。"}, {"id": 1639, "category": "家庭与情感", "type": "日常口语", "english": "He's been working hard to provide a better life for his family.", "chinese": "他一直在努力工作，为家人提供更好的生活。"}, {"id": 1640, "category": "家庭与情感", "type": "日常口语", "english": "The advice that my father gave me when I was young still guides me to this day.", "chinese": "我小时候父亲给我的建议至今仍然指引着我。"}, {"id": 1641, "category": "家庭与情感", "type": "日常口语", "english": "I need to learn to express my feelings instead of keeping them bottled up inside.", "chinese": "我需要学会表达自己的感受，而不是把它们憋在心里。"}, {"id": 1642, "category": "家庭与情感", "type": "日常口语", "english": "She's been feeling lonely ever since her best friend moved to another city.", "chinese": "自从她最好的朋友搬到另一个城市后，她一直感到孤独。"}, {"id": 1643, "category": "家庭与情感", "type": "日常口语", "english": "If we don't communicate openly, misunderstandings will keep coming up between us.", "chinese": "如果我们不坦诚沟通，我们之间会不断出现误解。"}, {"id": 1644, "category": "家庭与情感", "type": "日常口语", "english": "The love that my parents have shown me throughout my life has shaped who I am today.", "chinese": "父母在我一生中给予我的爱塑造了今天的我。"}, {"id": 1645, "category": "家庭与情感", "type": "日常口语", "english": "We should make it a priority to have dinner together as a family every evening.", "chinese": "我们应该把每天晚上一家人一起吃晚饭作为优先事项。"}, {"id": 1646, "category": "家庭与情感", "type": "日常口语", "english": "I've been feeling overwhelmed by all the expectations that my family has placed on me.", "chinese": "我一直感到被家人对我的期望压得喘不过气来。"}, {"id": 1647, "category": "家庭与情感", "type": "日常口语", "english": "The child who was adopted by the couple has brought so much joy into their lives.", "chinese": "那对夫妇收养的孩子给他们的生活带来了很多欢乐。"}, {"id": 1648, "category": "家庭与情感", "type": "日常口语", "english": "If you want your marriage to last, you need to put in the effort to keep the romance alive.", "chinese": "如果你想让婚姻长久，你需要努力保持浪漫。"}, {"id": 1649, "category": "家庭与情感", "type": "日常口语", "english": "She's been struggling to balance her career and family life for years.", "chinese": "多年来她一直在努力平衡事业和家庭生活。"}, {"id": 1650, "category": "家庭与情感", "type": "日常口语", "english": "I can't imagine what my life would be like without the love and support of my family.", "chinese": "我无法想象如果没有家人的爱和支持，我的生活会是什么样子。"}, {"id": 1651, "category": "家庭与情感", "type": "日常口语", "english": "The conversation that we had last night really helped me understand where you're coming from.", "chinese": "我们昨晚的谈话真的帮助我理解了你的立场。"}, {"id": 1652, "category": "家庭与情感", "type": "日常口语", "english": "He's been feeling left out ever since his siblings started hanging out without him.", "chinese": "自从他的兄弟姐妹开始不带他一起玩之后，他一直感到被冷落。"}, {"id": 1653, "category": "家庭与情感", "type": "日常口语", "english": "If I could turn back time, I would have been a more present and attentive parent.", "chinese": "如果时光可以倒流，我会做一个更陪伴和细心的父母。"}, {"id": 1654, "category": "家庭与情感", "type": "日常口语", "english": "We need to learn to forgive each other and move on instead of holding grudges.", "chinese": "我们需要学会互相原谅并继续前进，而不是记仇。"}, {"id": 1655, "category": "家庭与情感", "type": "日常口语", "english": "I've been feeling anxious about my parents getting older and needing more care.", "chinese": "我一直为父母越来越老、需要更多照顾而感到焦虑。"}, {"id": 1656, "category": "家庭与情感", "type": "日常口语", "english": "The family photo that hangs in the living room reminds me of the happy times we've shared.", "chinese": "客厅里挂着的那张全家福让我想起了我们共度的快乐时光。"}, {"id": 1657, "category": "家庭与情感", "type": "日常口语", "english": "She broke down in tears when she realized how much she had hurt her mother's feelings.", "chinese": "当她意识到自己有多伤妈妈的心时，她崩溃大哭。"}, {"id": 1658, "category": "家庭与情感", "type": "日常口语", "english": "If you want to raise happy and healthy children, you need to lead by example.", "chinese": "如果你想养育快乐健康的孩子，你需要以身作则。"}, {"id": 1659, "category": "家庭与情感", "type": "日常口语", "english": "I've been thinking a lot about what kind of parent I want to be.", "chinese": "我一直在想我想成为什么样的父母。"}, {"id": 1660, "category": "家庭与情感", "type": "日常口语", "english": "The support system that my family provides is something I'm incredibly grateful for.", "chinese": "我的家人提供的支持系统让我无比感激。"}, {"id": 1661, "category": "家庭与情感", "type": "日常口语", "english": "We should never take our loved ones for granted because we never know what tomorrow brings.", "chinese": "我们永远不应该把所爱的人视为理所当然，因为我们不知道明天会带来什么。"}, {"id": 1662, "category": "家庭与情感", "type": "日常口语", "english": "He's been trying to patch up the relationship with his estranged brother.", "chinese": "他一直在努力修复与疏远的哥哥的关系。"}, {"id": 1663, "category": "家庭与情感", "type": "日常口语", "english": "If I had been more understanding, our fight wouldn't have escalated the way it did.", "chinese": "如果我更理解一些，我们的争吵就不会升级到那种程度。"}, {"id": 1664, "category": "家庭与情感", "type": "日常口语", "english": "She's been feeling a sense of emptiness since her children left for college.", "chinese": "自从孩子们上大学后，她一直感到一种空虚感。"}, {"id": 1665, "category": "家庭与情感", "type": "日常口语", "english": "I can always count on my family to be there for me no matter what happens.", "chinese": "无论发生什么，我总是可以依靠家人在我身边。"}, {"id": 1666, "category": "家庭与情感", "type": "日常口语", "english": "The values that were instilled in me by my parents have guided me throughout my life.", "chinese": "父母灌输给我的价值观一直指引着我的人生。"}, {"id": 1667, "category": "家庭与情感", "type": "日常口语", "english": "We need to create more opportunities for family bonding so we can grow closer together.", "chinese": "我们需要创造更多家庭互动的机会，这样我们才能更亲近。"}, {"id": 1668, "category": "家庭与情感", "type": "日常口语", "english": "If you're feeling stressed out, talking to someone you trust can make a huge difference.", "chinese": "如果你感到压力很大，和你信任的人聊聊会有很大帮助。"}, {"id": 1669, "category": "家庭与情感", "type": "日常口语", "english": "I've been trying to be more patient with my kids, especially when they misbehave.", "chinese": "我一直在努力对孩子更有耐心，特别是他们调皮的时候。"}, {"id": 1670, "category": "家庭与情感", "type": "日常口语", "english": "The memory of my childhood home still brings back warm feelings whenever I think about it.", "chinese": "每当我想起童年的家，它仍然会唤起温暖的感受。"}, {"id": 1671, "category": "家庭与情感", "type": "日常口语", "english": "She's been putting a lot of pressure on herself to be the perfect mother.", "chinese": "她一直在给自己施加很大压力，想做一个完美的母亲。"}, {"id": 1672, "category": "家庭与情感", "type": "日常口语", "english": "If we had communicated more openly from the beginning, we could have avoided a lot of misunderstandings.", "chinese": "如果我们从一开始就更坦诚地沟通，就能避免很多误解。"}, {"id": 1673, "category": "家庭与情感", "type": "日常口语", "english": "I can't express how much it means to me to have a family that supports my dreams.", "chinese": "我无法表达拥有一个支持我梦想的家庭对我来说意味着多少。"}, {"id": 1674, "category": "家庭与情感", "type": "日常口语", "english": "The holiday season is always a special time when our entire family comes together.", "chinese": "假日季节总是我们全家团聚的特殊时刻。"}, {"id": 1675, "category": "家庭与情感", "type": "日常口语", "english": "We've been through thick and thin together, and that's what makes our family bond unbreakable.", "chinese": "我们一起经历了风风雨雨，正是这些让我们的家庭纽带牢不可破。"}, {"id": 1676, "category": "家庭与情感", "type": "日常口语", "english": "He's been feeling nostalgic about the days when the whole family would gather at his grandmother's house.", "chinese": "他一直怀念全家人在奶奶家聚在一起的日子。"}, {"id": 1677, "category": "家庭与情感", "type": "日常口语", "english": "If you want to strengthen your relationship with your partner, you should try doing new activities together.", "chinese": "如果你想加强与伴侣的关系，应该尝试一起做新的活动。"}, {"id": 1678, "category": "家庭与情感", "type": "日常口语", "english": "I've been learning to appreciate the little moments that I spend with my family.", "chinese": "我一直在学会珍惜和家人一起度过的每一个小瞬间。"}, {"id": 1679, "category": "家庭与情感", "type": "日常口语", "english": "The way she handled the conflict with her sister showed a lot of maturity and emotional intelligence.", "chinese": "她处理与姐姐冲突的方式展现了很多成熟度和情商。"}, {"id": 1680, "category": "家庭与情感", "type": "日常口语", "english": "We should make it a point to celebrate each other's achievements, no matter how small they are.", "chinese": "我们应该一定要庆祝彼此的成就，无论它们有多小。"}, {"id": 1681, "category": "家庭与情感", "type": "日常口语", "english": "She's been feeling torn between her career ambitions and her desire to start a family.", "chinese": "她一直感到在事业野心和组建家庭的愿望之间左右为难。"}, {"id": 1682, "category": "家庭与情感", "type": "日常口语", "english": "If I could give my younger self one piece of advice, it would be to cherish every moment with family.", "chinese": "如果我能给年轻时的自己一个建议，那就是珍惜和家人在一起的每一刻。"}, {"id": 1683, "category": "家庭与情感", "type": "日常口语", "english": "I've been noticing that my teenage daughter has been pulling away from the family lately.", "chinese": "我注意到我十几岁的女儿最近一直在疏远家人。"}, {"id": 1684, "category": "家庭与情感", "type": "日常口语", "english": "The loss of a loved one is one of the most painful experiences that anyone can go through.", "chinese": "失去所爱之人是任何人都能经历的最痛苦的事情之一。"}, {"id": 1685, "category": "家庭与情感", "type": "日常口语", "english": "We need to be there for each other during the difficult times, not just the good ones.", "chinese": "我们需要在困难时期互相支持，而不仅仅是在好时光。"}, {"id": 1686, "category": "家庭与情感", "type": "日常口语", "english": "He's been making an effort to spend more quality time with his aging mother.", "chinese": "他一直在努力花更多高质量的时间陪伴年迈的母亲。"}, {"id": 1687, "category": "家庭与情感", "type": "日常口语", "english": "If you want to build a strong family, you need to be willing to compromise and make sacrifices.", "chinese": "如果你想建立一个强大的家庭，你需要愿意妥协和做出牺牲。"}, {"id": 1688, "category": "家庭与情感", "type": "日常口语", "english": "I can't help but smile whenever I think about the funny things my kids say.", "chinese": "每当想起孩子们说的有趣的话，我就忍不住微笑。"}, {"id": 1689, "category": "家庭与情感", "type": "日常口语", "english": "The relationship between siblings is often the longest-lasting relationship in a person's life.", "chinese": "兄弟姐妹之间的关系通常是人生中最持久的关系。"}, {"id": 1690, "category": "家庭与情感", "type": "日常口语", "english": "We've been trying to create new family traditions that our children will remember fondly.", "chinese": "我们一直在努力创造新的家庭传统，让孩子们能美好地回忆。"}, {"id": 1691, "category": "家庭与情感", "type": "日常口语", "english": "She's been feeling a mix of excitement and anxiety about becoming a mother for the first time.", "chinese": "第一次当妈妈，她既兴奋又焦虑。"}, {"id": 1692, "category": "家庭与情感", "type": "日常口语", "english": "If I had appreciated my family more when I was younger, I would have been a happier person.", "chinese": "如果我年轻时更珍惜家人，我会是一个更快乐的人。"}, {"id": 1693, "category": "家庭与情感", "type": "日常口语", "english": "I've been writing letters to my children that they can read when they're older.", "chinese": "我一直在给孩子们写信，等他们长大了可以看。"}, {"id": 1694, "category": "家庭与情感", "type": "日常口语", "english": "The emotional support that friends provide can sometimes be just as important as family support.", "chinese": "朋友提供的情感支持有时和家庭支持一样重要。"}, {"id": 1695, "category": "家庭与情感", "type": "日常口语", "english": "We should never let our pride get in the way of apologizing to the people we love.", "chinese": "我们绝不能让自尊心阻碍我们向所爱的人道歉。"}, {"id": 1696, "category": "家庭与情感", "type": "日常口语", "english": "He's been going to therapy to work through some unresolved issues from his childhood.", "chinese": "他一直在接受心理治疗，来解决一些童年时期未解决的问题。"}, {"id": 1697, "category": "家庭与情感", "type": "日常口语", "english": "If you want to be a good role model for your children, you need to practice what you preach.", "chinese": "如果你想给孩子做一个好榜样，你需要言行一致。"}, {"id": 1698, "category": "家庭与情感", "type": "日常口语", "english": "I've come to realize that family is the most important thing in life.", "chinese": "我逐渐意识到家庭是人生中最重要的事情。"}, {"id": 1699, "category": "家庭与情感", "type": "日常口语", "english": "The warmth and love that I feel when I'm with my family is something I can't find anywhere else.", "chinese": "和家人在一起时感受到的温暖和爱是我在其他任何地方都找不到的。"}, {"id": 1700, "category": "家庭与情感", "type": "日常口语", "english": "We should always remember to tell the people we love how much they mean to us before it's too late.", "chinese": "我们应该永远记得在为时已晚之前，告诉我们爱的人他们对我们的意义。"}];
        
        // State
        let currentIndex = 0;
        let stats = {
            totalDone: 0,
            correctCount: 0,
            wrongCount: 0,
            appearCounts: {}  // {sentenceId: count}
        };
        
        // Load stats from localStorage
        function loadStats() {
            const saved = localStorage.getItem('englishPracticeStats');
            if (saved) {
                stats = JSON.parse(saved);
            }
            updateStatsDisplay();
        }
        
        // Save stats to localStorage
        function saveStats() {
            localStorage.setItem('englishPracticeStats', JSON.stringify(stats));
        }
        
        // Update stats display
        function updateStatsDisplay() {
            document.getElementById('totalDone').textContent = stats.totalDone;
            document.getElementById('correctCount').textContent = stats.correctCount;
            document.getElementById('wrongCount').textContent = stats.wrongCount;
            
            const rate = stats.totalDone > 0 
                ? Math.round((stats.correctCount / stats.totalDone) * 100) + '%'
                : '0%';
            document.getElementById('correctRate').textContent = rate;
        }
        
        // Get random sentence
        function getRandomSentence() {
            currentIndex = Math.floor(Math.random() * SENTENCES.length);
            return SENTENCES[currentIndex];
        }
        
        // Show sentence
        function showSentence(sentence) {
            document.getElementById('sentenceId').textContent = '句子 #' + sentence.id;
            document.getElementById('sentenceType').textContent = sentence.type;
            document.getElementById('sentenceCategory').textContent = sentence.category;
            
            const count = stats.appearCounts[sentence.id] || 0;
            document.getElementById('sentenceAppearCount').textContent = '出现次数: ' + count;
            
            document.getElementById('chineseText').textContent = sentence.chinese;
            document.getElementById('userInput').value = '';
            document.getElementById('answerSection').classList.remove('show');
            document.getElementById('answerText').textContent = '';
            
            // Update appear count
            stats.appearCounts[sentence.id] = count + 1;
            saveStats();
        }
        
        // Submit answer
        function submitAnswer() {
            const sentence = SENTENCES[currentIndex];
            const userInput = document.getElementById('userInput').value.trim();
            
            if (!userInput) {
                alert('请输入您的答案');
                return;
            }
            
            document.getElementById('answerText').textContent = sentence.english;
            document.getElementById('answerSection').classList.add('show');
        }
        
        // Mark correct
        function markCorrect() {
            stats.totalDone++;
            stats.correctCount++;
            saveStats();
            updateStatsDisplay();
            nextSentence();
        }
        
        // Mark wrong
        function markWrong() {
            stats.totalDone++;
            stats.wrongCount++;
            saveStats();
            updateStatsDisplay();
            nextSentence();
        }
        
        // Skip sentence
        function skipSentence() {
            nextSentence();
        }
        
        // Next sentence
        function nextSentence() {
            const sentence = getRandomSentence();
            showSentence(sentence);
        }
        
        // Show section
        function showSection(section) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            if (section === 'practice') {
                document.getElementById('practiceSection').style.display = 'block';
                document.getElementById('librarySection').classList.remove('show');
            } else if (section === 'library') {
                document.getElementById('practiceSection').style.display = 'none';
                document.getElementById('librarySection').classList.add('show');
                renderLibrary();
            }
        }
        
        // Reset stats
        function resetStats() {
            if (confirm('确定要重置所有统计数据吗？')) {
                stats = {
                    totalDone: 0,
                    correctCount: 0,
                    wrongCount: 0,
                    appearCounts: {}
                };
                saveStats();
                updateStatsDisplay();
            }
        }
        
        // Populate category filter
        function populateCategoryFilter() {
            const categories = [...new Set(SENTENCES.map(s => s.category))];
            const select = document.getElementById('categoryFilter');
            
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }
        
        // Filter library
        function filterLibrary() {
            const typeFilter = document.getElementById('typeFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = SENTENCES;
            
            if (typeFilter !== 'all') {
                filtered = filtered.filter(s => s.type === typeFilter);
            }
            
            if (categoryFilter !== 'all') {
                filtered = filtered.filter(s => s.category === categoryFilter);
            }
            
            if (searchTerm) {
                filtered = filtered.filter(s => 
                    s.english.toLowerCase().includes(searchTerm) ||
                    s.chinese.toLowerCase().includes(searchTerm)
                );
            }
            
            renderLibraryList(filtered);
        }
        
        // Render library
        function renderLibrary() {
            renderLibraryList(SENTENCES);
        }
        
        // Render library list
        function renderLibraryList(sentences) {
            const list = document.getElementById('sentenceList');
            list.innerHTML = '';
            
            sentences.forEach(s => {
                const item = document.createElement('div');
                item.className = 'sentence-item';
                item.onclick = () => practiceSentence(s);
                
                const appearCount = stats.appearCounts[s.id] || 0;
                
                item.innerHTML = `
                    <div class="sentence-item-header">
                        <span class="sentence-id">#${s.id}</span>
                        <span class="sentence-meta">${s.type} | ${s.category}</span>
                    </div>
                    <div class="sentence-english">${s.english}</div>
                    <div class="sentence-chinese">${s.chinese}</div>
                    <div class="sentence-count">出现次数: ${appearCount}</div>
                `;
                
                list.appendChild(item);
            });
        }
        
        // Practice specific sentence
        function practiceSentence(sentence) {
            currentIndex = SENTENCES.findIndex(s => s.id === sentence.id);
            showSentence(sentence);
            
            // Switch to practice mode
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector('.nav-tab').classList.add('active');
            document.getElementById('practiceSection').style.display = 'block';
            document.getElementById('librarySection').classList.remove('show');
        }
        
        // Initialize
        function init() {
            loadStats();
            populateCategoryFilter();
            const sentence = getRandomSentence();
            showSentence(sentence);
        }
        
        init();
    </script>
</body>
</html>
