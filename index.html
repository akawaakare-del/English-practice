e would appreciate it if you could provide clarification on the following points.", "chinese": "如果您能对以下几点进行澄清，我们将不胜感激。"}, {"id": 822, "category": "书面表达", "type": "商务英语", "english": "The attached document outlines the key findings of our investigation.", "chinese": "附件概述了我们调查的主要发现。"}, {"id": 823, "category": "书面表达", "type": "商务英语", "english": "Please note that the deadline for submission has been extended to Friday.", "chinese": "请注意，提交截止日期已延长至周五。"}, {"id": 824, "category": "书面表达", "type": "商务英语", "english": "We are delighted to inform you that your application has been approved.", "chinese": "我们很高兴地通知您，您的申请已获得批准。"}, {"id": 825, "category": "书面表达", "type": "商务英语", "english": "In light of recent developments, we have revised our terms and conditions.", "chinese": "鉴于最近的发展，我们已修订了条款和条件。"}, {"id": 826, "category": "书面表达", "type": "商务英语", "english": "We trust that this arrangement meets with your approval.", "chinese": "我们相信这一安排会得到您的批准。"}, {"id": 827, "category": "书面表达", "type": "商务英语", "english": "Your cooperation in this matter is essential for the success of the project.", "chinese": "您在此事上的合作对项目的成功至关重要。"}, {"id": 828, "category": "书面表达", "type": "商务英语", "english": "We are compelled to remind you that payment is now overdue.", "chinese": "我们不得不提醒您，付款现已逾期。"}, {"id": 829, "category": "书面表达", "type": "商务英语", "english": "The meeting minutes will be distributed to all attendees by end of day.", "chinese": "会议记录将在今天结束前分发给所有与会者。"}, {"id": 830, "category": "书面表达", "type": "商务英语", "english": "We wish to bring to your attention an issue that requires immediate action.", "chinese": "我们希望提请贵方注意一个需要立即采取行动的问题。"}, {"id": 831, "category": "书面表达", "type": "商务英语", "english": "Please confirm receipt of this email at your earliest convenience.", "chinese": "请在方便时尽早确认收到此邮件。"}, {"id": 832, "category": "书面表达", "type": "商务英语", "english": "We are pleased to enclose our latest catalog for your consideration.", "chinese": "我们很高兴附上我们的最新目录供您考虑。"}, {"id": 833, "category": "书面表达", "type": "商务英语", "english": "It is with regret that we must inform you of the cancellation.", "chinese": "我们遗憾地通知您取消事宜。"}, {"id": 834, "category": "书面表达", "type": "商务英语", "english": "We request that you review the attached document and provide your comments.", "chinese": "我们请求您审阅附件并提供您的意见。"}, {"id": 835, "category": "书面表达", "type": "商务英语", "english": "The purpose of this email is to notify you of a change in schedule.", "chinese": "本邮件的目的是通知您日程变更。"}, {"id": 836, "category": "书面表达", "type": "商务英语", "english": "We would be grateful if you could expedite the processing of this request.", "chinese": "如果您能加快处理此请求，我们将不胜感激。"}, {"id": 837, "category": "书面表达", "type": "商务英语", "english": "Please be informed that the venue for the conference has been changed.", "chinese": "请知悉，会议地点已变更。"}, {"id": 838, "category": "书面表达", "type": "商务英语", "english": "We are writing to express our concern regarding the quality of the recent delivery.", "chinese": "我们写信表达对最近交货质量的担忧。"}, {"id": 839, "category": "书面表达", "type": "商务英语", "english": "Your immediate response to this matter would be most welcome.", "chinese": "如果您能立即回复此事，我们将非常欢迎。"}, {"id": 840, "category": "书面表达", "type": "商务英语", "english": "We hereby confirm that the agreement has been signed by both parties.", "chinese": "我们特此确认协议已由双方签署。"}, {"id": 841, "category": "书面表达", "type": "商务英语", "english": "In compliance with regulatory requirements, we must update our records.", "chinese": "根据监管要求，我们必须更新我们的记录。"}, {"id": 842, "category": "书面表达", "type": "商务英语", "english": "We apologize for the oversight and have taken steps to prevent recurrence.", "chinese": "我们对这一疏忽表示歉意，并已采取措施防止再次发生。"}, {"id": 843, "category": "书面表达", "type": "商务英语", "english": "The report highlights several areas where improvements can be made.", "chinese": "报告强调了可以改进的几个方面。"}, {"id": 844, "category": "书面表达", "type": "商务英语", "english": "We are pleased to extend an invitation to our annual shareholders meeting.", "chinese": "我们很高兴邀请您参加我们的年度股东大会。"}, {"id": 845, "category": "书面表达", "type": "商务英语", "english": "Please do not hesitate to reach out if you require further assistance.", "chinese": "如果您需要进一步帮助，请随时联系。"}, {"id": 846, "category": "书面表达", "type": "商务英语", "english": "We wish to acknowledge receipt of your payment dated June 1st.", "chinese": "我们希望确认收到您6月1日的付款。"}, {"id": 847, "category": "书面表达", "type": "商务英语", "english": "The terms outlined in the contract are subject to final approval.", "chinese": "合同中概述的条款须经最终批准。"}, {"id": 848, "category": "书面表达", "type": "商务英语", "english": "We are writing to request an extension of the deadline for submission.", "chinese": "我们写信请求延长提交截止日期。"}, {"id": 849, "category": "书面表达", "type": "商务英语", "english": "Your understanding and patience in this matter are greatly appreciated.", "chinese": "感谢您在此事上的理解和耐心。"}, {"id": 850, "category": "书面表达", "type": "商务英语", "english": "We trust that the enclosed information will be of assistance to you.", "chinese": "我们相信随附的信息对您会有所帮助。"}, {"id": 851, "category": "书面表达", "type": "商务英语", "english": "This serves as a formal notice of termination of our business relationship.", "chinese": "本函作为我们业务关系终止的正式通知。"}, {"id": 852, "category": "书面表达", "type": "商务英语", "english": "We are delighted to welcome you as a new client of our firm.", "chinese": "我们很高兴欢迎您成为我们公司的客户。"}, {"id": 853, "category": "书面表达", "type": "商务英语", "english": "Please find below the details of the transaction for your records.", "chinese": "请见以下交易详情供您存档。"}, {"id": 854, "category": "书面表达", "type": "商务英语", "english": "We regret any inconvenience this may have caused and assure you of our best attention.", "chinese": "我们对这可能造成的任何不便表示遗憾，并向您保证我们会给予最好的关注。"}, {"id": 855, "category": "书面表达", "type": "商务英语", "english": "The proposal submitted has been reviewed and is now being considered.", "chinese": "提交的提案已经过审阅，目前正在考虑中。"}, {"id": 856, "category": "书面表达", "type": "商务英语", "english": "We wish to inform you that your account has been activated successfully.", "chinese": "我们希望通知您，您的账户已成功激活。"}, {"id": 857, "category": "书面表达", "type": "商务英语", "english": "Your feedback is valuable to us and will be taken into consideration.", "chinese": "您的反馈对我们很有价值，将被纳入考虑。"}, {"id": 858, "category": "书面表达", "type": "商务英语", "english": "We are pleased to confirm that the reservation has been made as requested.", "chinese": "我们很高兴确认预订已按要求完成。"}, {"id": 859, "category": "书面表达", "type": "商务英语", "english": "In view of the circumstances, we have decided to waive the late fee.", "chinese": "鉴于这种情况，我们决定免除滞纳金。"}, {"id": 860, "category": "书面表达", "type": "商务英语", "english": "We look forward to a continued and mutually beneficial relationship.", "chinese": "我们期待持续和互利的关系。"}, {"id": 861, "category": "书面表达", "type": "商务英语", "english": "Please be advised that the terms of payment have been modified.", "chinese": "请注意，付款条款已修改。"}, {"id": 862, "category": "书面表达", "type": "商务英语", "english": "We are writing to clarify the misunderstanding regarding the delivery date.", "chinese": "我们写信澄清关于交货日期的误解。"}, {"id": 863, "category": "书面表达", "type": "商务英语", "english": "Your prompt reply will enable us to proceed with the necessary arrangements.", "chinese": "您的及时回复将使我们能够继续进行必要的安排。"}, {"id": 864, "category": "书面表达", "type": "商务英语", "english": "We hereby authorize the release of the funds as per your request.", "chinese": "我们特此授权按照您的要求释放资金。"}, {"id": 865, "category": "书面表达", "type": "商务英语", "english": "The attached spreadsheet contains the breakdown of costs for your review.", "chinese": "附件电子表格包含成本明细供您审阅。"}, {"id": 866, "category": "书面表达", "type": "商务英语", "english": "We wish to bring to your notice a discrepancy in the invoice amount.", "chinese": "我们希望提请您注意发票金额中的差异。"}, {"id": 867, "category": "书面表达", "type": "商务英语", "english": "Please accept our sincere apologies for the error in the previous communication.", "chinese": "请接受我们对之前沟通中错误的诚挚道歉。"}, {"id": 868, "category": "书面表达", "type": "商务英语", "english": "We are pleased to inform you that your membership has been renewed.", "chinese": "我们很高兴通知您，您的会员资格已续期。"}, {"id": 869, "category": "书面表达", "type": "商务英语", "english": "In accordance with your instructions, we have processed the refund.", "chinese": "根据您的指示，我们已处理退款。"}, {"id": 870, "category": "书面表达", "type": "商务英语", "english": "We trust that you will find the enclosed proposal satisfactory.", "chinese": "我们相信您会发现随附的提案令人满意。"}, {"id": 871, "category": "书面表达", "type": "商务英语", "english": "Your cooperation in resolving this matter is urgently requested.", "chinese": "恳请您合作解决此事。"}, {"id": 872, "category": "书面表达", "type": "商务英语", "english": "We are writing to notify you of a change in our banking details.", "chinese": "我们写信通知您我们的银行信息变更。"}, {"id": 873, "category": "书面表达", "type": "商务英语", "english": "The document must be signed and returned within five business days.", "chinese": "文件必须在五个工作日内签署并退回。"}, {"id": 874, "category": "书面表达", "type": "商务英语", "english": "We would appreciate your confirmation of the arrangements detailed below.", "chinese": "我们将感谢您确认以下详细安排。"}, {"id": 875, "category": "书面表达", "type": "商务英语", "english": "Please be advised that our prices are subject to change without notice.", "chinese": "请注意，我们的价格如有变更恕不另行通知。"}, {"id": 876, "category": "书面表达", "type": "商务英语", "english": "We regret to inform you that the item you requested is currently out of stock.", "chinese": "我们很遗憾地通知您，您要求的商品目前缺货。"}, {"id": 877, "category": "书面表达", "type": "商务英语", "english": "Your attention to this urgent matter would be greatly appreciated.", "chinese": "如果您能关注这个紧急事项，我们将不胜感激。"}, {"id": 878, "category": "书面表达", "type": "商务英语", "english": "We are pleased to confirm receipt of your order number 12345.", "chinese": "我们很高兴确认收到您的订单号12345。"}, {"id": 879, "category": "书面表达", "type": "商务英语", "english": "In response to your complaint, we have investigated the matter thoroughly.", "chinese": "针对您的投诉，我们已彻底调查此事。"}, {"id": 880, "category": "书面表达", "type": "商务英语", "english": "We trust that this resolution meets with your satisfaction.", "chinese": "我们相信这一解决方案会令您满意。"}, {"id": 881, "category": "书面表达", "type": "商务英语", "english": "Please find enclosed the revised contract for your signature.", "chinese": "请查收随附的修订合同供您签署。"}, {"id": 882, "category": "书面表达", "type": "商务英语", "english": "We wish to express our gratitude for your patience during this process.", "chinese": "我们希望对您在过程中的耐心表示感谢。"}, {"id": 883, "category": "书面表达", "type": "商务英语", "english": "The meeting scheduled for tomorrow has been postponed until further notice.", "chinese": "定于明天的会议已推迟，另行通知。"}, {"id": 884, "category": "书面表达", "type": "商务英语", "english": "We are writing to request your participation in our customer satisfaction survey.", "chinese": "我们写信请求您参与我们的客户满意度调查。"}, {"id": 885, "category": "书面表达", "type": "商务英语", "english": "Your signature on the attached form is required to proceed.", "chinese": "需要在附件表格上签名才能继续。"}, {"id": 886, "category": "书面表达", "type": "商务英语", "english": "We are delighted to announce the launch of our new product line.", "chinese": "我们很高兴宣布推出我们的新产品线。"}, {"id": 887, "category": "书面表达", "type": "商务英语", "english": "Please do not hesitate to contact us should you need any clarification.", "chinese": "如有任何疑问，请随时联系我们。"}, {"id": 888, "category": "书面表达", "type": "商务英语", "english": "We hereby certify that the information provided is accurate and complete.", "chinese": "我们特此证明所提供的信息准确完整。"}, {"id": 889, "category": "书面表达", "type": "商务英语", "english": "In light of your request, we have prepared a detailed quotation.", "chinese": "鉴于您的要求，我们已准备了详细报价。"}, {"id": 890, "category": "书面表达", "type": "商务英语", "english": "We look forward to your favorable response at your earliest convenience.", "chinese": "期待您在方便时尽早给予积极回复。"}, {"id": 891, "category": "书面表达", "type": "商务英语", "english": "The payment terms are as follows: net thirty days from date of invoice.", "chinese": "付款条件如下：发票日期起净30天。"}, {"id": 892, "category": "书面表达", "type": "商务英语", "english": "We regret any misunderstanding and are committed to resolving the issue.", "chinese": "我们对任何误解表示遗憾，并致力于解决问题。"}, {"id": 893, "category": "书面表达", "type": "商务英语", "english": "Please confirm your acceptance of these terms by return email.", "chinese": "请通过回复邮件确认您接受这些条款。"}, {"id": 894, "category": "书面表达", "type": "商务英语", "english": "We are pleased to advise that the shipment has been dispatched.", "chinese": "我们很高兴通知您货物已发出。"}, {"id": 895, "category": "书面表达", "type": "商务英语", "english": "Your prompt settlement of this account would be appreciated.", "chinese": "如果您能及时结清此账户，我们将不胜感激。"}, {"id": 896, "category": "书面表达", "type": "商务英语", "english": "We wish to draw your attention to the expiry date of your subscription.", "chinese": "我们希望提请您注意订阅的到期日期。"}, {"id": 897, "category": "书面表达", "type": "商务英语", "english": "The enclosed brochure provides detailed information about our services.", "chinese": "随附的小册子提供有关我们服务的详细信息。"}, {"id": 898, "category": "书面表达", "type": "商务英语", "english": "We are writing to confirm the details of our meeting next week.", "chinese": "我们写信确认下周会议的详情。"}, {"id": 899, "category": "书面表达", "type": "商务英语", "english": "Your continued patronage is important to us and greatly valued.", "chinese": "您的持续惠顾对我们很重要，我们非常珍视。"}, {"id": 900, "category": "书面表达", "type": "商务英语", "english": "We look forward to serving you and meeting your business needs.", "chinese": "期待为您服务并满足您的业务需求。"}, {"id": 901, "category": "书面表达", "type": "商务英语", "english": "On behalf of the entire board, I would like to express our sincere gratitude for the outstanding contribution you have made to the merger project.", "chinese": "我谨代表全体董事会，对您在并购项目中所做出的杰出贡献表示衷心感谢。"}, {"id": 902, "category": "书面表达", "type": "商务英语", "english": "Had it not been for your prompt intervention, the negotiation would have collapsed, resulting in substantial financial losses for both parties.", "chinese": "若非您及时介入，谈判早已破裂，双方都将蒙受巨大的财务损失。"}, {"id": 903, "category": "书面表达", "type": "商务英语", "english": "It is imperative that every department head submit the quarterly budget proposal no later than the end of this month.", "chinese": "各部门负责人务必在本月底之前提交季度预算方案。"}, {"id": 904, "category": "书面表达", "type": "商务英语", "english": "Not only did our company achieve record-breaking revenue last fiscal year, but it also expanded its market share across three continents.", "chinese": "我们公司上个财年不仅实现了创纪录的营收，还在三大洲扩大了市场份额。"}, {"id": 905, "category": "书面表达", "type": "商务英语", "english": "With a view to enhancing operational efficiency, the management has decided to implement a new enterprise resource planning system.", "chinese": "为了提升运营效率，管理层已决定实施新的企业资源规划系统。"}, {"id": 906, "category": "书面表达", "type": "商务英语", "english": "The report, which was compiled by a team of senior analysts, highlights the key trends that are likely to shape the industry in the coming decade.", "chinese": "这份由资深分析师团队编制的报告，突出了未来十年可能塑造该行业的关键趋势。"}, {"id": 907, "category": "书面表达", "type": "商务英语", "english": "Under no circumstances should confidential information be disclosed to unauthorized personnel without prior written consent from the CEO.", "chinese": "未经首席执行官事先书面同意，任何情况下都不得向未授权人员泄露机密信息。"}, {"id": 908, "category": "书面表达", "type": "商务英语", "english": "Having carefully reviewed the terms and conditions outlined in the contract, we have identified several clauses that require further clarification.", "chinese": "在仔细审阅了合同中规定的条款之后，我们发现有几处条款需要进一步澄清。"}, {"id": 909, "category": "书面表达", "type": "商务英语", "english": "The board of directors recommended that the proposed acquisition be postponed until a more thorough due diligence investigation could be conducted.", "chinese": "董事会建议将拟议中的收购推迟，直到能够进行更为彻底的尽职调查。"}, {"id": 910, "category": "书面表达", "type": "商务英语", "english": "It is the responsibility of the finance department, in collaboration with the legal team, to ensure that all regulatory requirements are fully complied with.", "chinese": "财务部门与法律团队协作，共同确保所有监管要求得到全面遵守，这是其职责所在。"}, {"id": 911, "category": "书面表达", "type": "商务英语", "english": "In light of the recent economic downturn, the company has been forced to lay off approximately fifteen percent of its workforce.", "chinese": "鉴于最近的经济衰退，公司被迫裁减了约百分之十五的员工。"}, {"id": 912, "category": "书面表达", "type": "商务英语", "english": "Were the shareholders to reject the proposed restructuring plan, the company would face the prospect of filing for bankruptcy protection.", "chinese": "如果股东们否决拟议中的重组方案，公司将面临申请破产保护的前景。"}, {"id": 913, "category": "书面表达", "type": "商务英语", "english": "The managing director emphasized that, unless immediate measures were taken to address the cash flow crisis, the company's survival would be at stake.", "chinese": "总经理强调，除非立即采取措施解决现金流危机，否则公司的生存将岌岌可危。"}, {"id": 914, "category": "书面表达", "type": "商务英语", "english": "So impressive was the presentation delivered by the marketing team that the client agreed to extend the partnership for another three years.", "chinese": "营销团队的演示令人印象深刻，客户因此同意将合作关系再延长三年。"}, {"id": 915, "category": "书面表达", "type": "商务英语", "english": "All things considered, it would be advisable for us to explore alternative suppliers before committing to a long-term procurement agreement.", "chinese": "综合考虑各方面因素，在签订长期采购协议之前，我们最好先探索其他供应商。"}, {"id": 916, "category": "书面表达", "type": "商务英语", "english": "The consultant suggested that the company diversify its investment portfolio so as to minimize exposure to market volatility.", "chinese": "顾问建议公司多元化其投资组合，以尽量减少对市场波动的敞口。"}, {"id": 917, "category": "书面表达", "type": "商务英语", "english": "On no account should the preliminary findings of this audit be shared with external stakeholders without the explicit approval of the audit committee.", "chinese": "未经审计委员会明确批准，绝不得将本次审计的初步结果与外部利益相关者分享。"}, {"id": 918, "category": "书面表达", "type": "商务英语", "english": "The fact that our competitors have recently launched a similar product underscores the need for us to accelerate our own research and development efforts.", "chinese": "我们的竞争对手最近推出了类似产品，这一事实凸显了我们加快自身研发努力的必要性。"}, {"id": 919, "category": "书面表达", "type": "商务英语", "english": "Provided that all parties adhere to the agreed-upon timeline, the project is expected to be completed well within the allocated budget.", "chinese": "只要各方遵守商定的时间表，该项目预计将在分配的预算内顺利完成。"}, {"id": 920, "category": "书面表达", "type": "商务英语", "english": "The CEO, accompanied by the chief financial officer, paid a visit to the newly established branch office in Shanghai last week.", "chinese": "首席执行官在首席财务官的陪同下，上周视察了新设立的上海分公司。"}, {"id": 921, "category": "书面表达", "type": "商务英语", "english": "Much to our disappointment, the supplier failed to deliver the goods in accordance with the specifications stipulated in the purchase order.", "chinese": "令我们深感失望的是，供应商未能按照采购订单中规定的规格交付货物。"}, {"id": 922, "category": "书面表达", "type": "商务英语", "english": "It is essential that the revised pricing strategy be communicated to all regional sales managers before the end of the current business quarter.", "chinese": "修订后的定价策略必须在当前商业季度结束之前传达给所有区域销售经理。"}, {"id": 923, "category": "书面表达", "type": "商务英语", "english": "Seldom has the company encountered such a challenging market environment, which calls for innovative approaches to customer engagement.", "chinese": "公司很少遇到如此充满挑战的市场环境，这需要创新的客户参与方式。"}, {"id": 924, "category": "书面表达", "type": "商务英语", "english": "The proposal put forward by the R&D department, having been thoroughly evaluated by the executive committee, was approved with minor modifications.", "chinese": "研发部门提出的提案经过执行委员会的全面评估后，在做了少量修改后获得批准。"}, {"id": 925, "category": "书面表达", "type": "商务英语", "english": "In the event that the merger is not approved by the regulatory authorities, both companies will continue to operate as independent entities.", "chinese": "如果合并未获监管机构批准，两家公司将继续作为独立实体运营。"}, {"id": 926, "category": "书面表达", "type": "商务英语", "english": "The training program, designed to equip employees with the latest digital skills, has been widely acclaimed as a model of corporate best practice.", "chinese": "该培训项目旨在使员工掌握最新的数字技能，已被广泛誉为企业最佳实践的典范。"}, {"id": 927, "category": "书面表达", "type": "商务英语", "english": "Only after the board has ratified the agreement will the legal department proceed with the formal signing ceremony.", "chinese": "只有在董事会批准该协议之后，法律部门才会推进正式的签署仪式。"}, {"id": 928, "category": "书面表达", "type": "商务英语", "english": "The company's decision to relocate its headquarters was driven by a desire to reduce overhead costs and gain access to a larger talent pool.", "chinese": "公司决定搬迁总部，其驱动力在于降低间接成本并获取更大的人才库。"}, {"id": 929, "category": "书面表达", "type": "商务英语", "english": "Should you require any additional information regarding the services we offer, please do not hesitate to contact our customer support team.", "chinese": "如果您需要关于我们提供的服务的任何额外信息，请随时联系我们的客户支持团队。"}, {"id": 930, "category": "书面表达", "type": "商务英语", "english": "The annual report reveals that, despite the challenging economic climate, the company managed to increase its profit margins by a significant margin.", "chinese": "年度报告显示，尽管经济环境充满挑战，公司仍成功地将利润率提高了显著幅度。"}, {"id": 931, "category": "书面表达", "type": "商务英语", "english": "At the request of the client, we have revised the project scope to accommodate the additional features that were discussed during the last meeting.", "chinese": "应客户要求，我们修订了项目范围，以纳入上次讨论中提及的附加功能。"}, {"id": 932, "category": "书面表达", "type": "商务英语", "english": "It is widely acknowledged that effective communication within an organization plays a pivotal role in fostering a culture of innovation and collaboration.", "chinese": "人们普遍认为，组织内部的有效沟通在培养创新与合作文化方面发挥着关键作用。"}, {"id": 933, "category": "书面表达", "type": "商务英语", "english": "Not until the auditors had completed their comprehensive review did the company realize the full extent of the accounting irregularities.", "chinese": "直到审计人员完成了全面审查，公司才意识到会计违规行为的全部严重程度。"}, {"id": 934, "category": "书面表达", "type": "商务英语", "english": "By means of a series of strategic partnerships, the startup has managed to establish a strong foothold in the highly competitive e-commerce market.", "chinese": "通过一系列战略合作，这家初创公司在竞争激烈的电子商务市场中成功站稳了脚跟。"}, {"id": 935, "category": "书面表达", "type": "商务英语", "english": "The managing director requested that all departmental reports be submitted in a standardized format so as to facilitate cross-departmental comparison.", "chinese": "总经理要求所有部门报告以标准化格式提交，以便于跨部门比较。"}, {"id": 936, "category": "书面表达", "type": "商务英语", "english": "The marketing campaign, which was launched at the beginning of the third quarter, has generated a substantial increase in brand awareness among the target demographic.", "chinese": "于第三季度初启动的营销活动，已在目标人群中对品牌知名度的提升产生了显著效果。"}, {"id": 937, "category": "书面表达", "type": "商务英语", "english": "Insofar as the budget allows, we intend to invest heavily in cutting-edge technology to maintain our competitive edge in the marketplace.", "chinese": "在预算允许的范围内，我们打算大力投资尖端技术，以保持在市场中的竞争优势。"}, {"id": 938, "category": "书面表达", "type": "商务英语", "english": "Little did the management anticipate that the sudden shift in consumer preferences would have such a profound impact on the company's bottom line.", "chinese": "管理层几乎没有预料到消费者偏好的突然转变会对公司的利润产生如此深远的影响。"}, {"id": 939, "category": "书面表达", "type": "商务英语", "english": "The terms of the lease agreement stipulate that the tenant is responsible for all maintenance and repair costs arising from normal wear and tear.", "chinese": "租赁协议的条款规定，承租人负责因正常磨损而产生的所有维护和修理费用。"}, {"id": 940, "category": "书面表达", "type": "商务英语", "english": "Having taken into account the feedback received from various stakeholders, the committee has decided to revise the draft policy document accordingly.", "chinese": "在考虑了从各利益相关方收到的反馈之后，委员会决定相应地修订政策草案。"}, {"id": 941, "category": "书面表达", "type": "商务英语", "english": "The company takes great pride in the fact that its products are manufactured in compliance with the most stringent international quality standards.", "chinese": "公司引以为豪的是，其产品严格按照最严格的国际质量标准进行生产。"}, {"id": 942, "category": "书面表达", "type": "商务英语", "english": "Were we to proceed with the proposed expansion plan, it would be necessary to secure additional funding from external investors.", "chinese": "如果我们推进拟议中的扩张计划，就有必要从外部投资者那里获得额外资金。"}, {"id": 943, "category": "书面表达", "type": "商务英语", "english": "The board strongly recommends that shareholders vote in favor of the resolution, as it is in the best interest of the company and its stakeholders.", "chinese": "董事会强烈建议股东投票赞成该决议，因为这符合公司及其利益相关者的最佳利益。"}, {"id": 944, "category": "书面表达", "type": "商务英语", "english": "In spite of the numerous challenges encountered during the implementation phase, the project was ultimately delivered on time and within budget.", "chinese": "尽管在实施阶段遇到了诸多挑战，该项目最终还是按时、在预算内完成交付。"}, {"id": 945, "category": "书面表达", "type": "商务英语", "english": "The CEO made it clear that any employee found to be in breach of the company's code of conduct would be subject to disciplinary action.", "chinese": "首席执行官明确表示，任何被发现违反公司行为准则的员工都将受到纪律处分。"}, {"id": 946, "category": "书面表达", "type": "商务英语", "english": "It is of the utmost importance that all financial transactions be recorded accurately and in accordance with the applicable accounting standards.", "chinese": "所有财务交易必须准确记录并符合适用的会计准则，这一点至关重要。"}, {"id": 947, "category": "书面表达", "type": "商务英语", "english": "The joint venture agreement, having been signed by both parties, is expected to generate significant synergies in the areas of research and distribution.", "chinese": "合资协议已由双方签署，预计将在研发和分销领域产生显著的协同效应。"}, {"id": 948, "category": "书面表达", "type": "商务英语", "english": "Under the terms of the service level agreement, the vendor is obligated to provide round-the-clock technical support to all registered users.", "chinese": "根据服务级别协议的条款，供应商有义务向所有注册用户提供全天候技术支持。"}, {"id": 949, "category": "书面表达", "type": "商务英语", "english": "Notwithstanding the initial setbacks, the team persevered and eventually succeeded in securing the contract with the multinational corporation.", "chinese": "尽管最初遭遇了挫折，团队坚持不懈，最终成功与这家跨国公司签订了合同。"}, {"id": 950, "category": "书面表达", "type": "商务英语", "english": "The human resources department has developed a comprehensive onboarding program aimed at facilitating the smooth integration of new hires into the organization.", "chinese": "人力资源部门制定了一套全面的入职培训计划，旨在促进新员工顺利融入组织。"}, {"id": 951, "category": "书面表达", "type": "商务英语", "english": "The board of directors, having deliberated at length on the matter, unanimously resolved to divest the company's non-core assets.", "chinese": "董事会在对此事进行了长时间的审议之后，一致决定剥离公司的非核心资产。"}, {"id": 952, "category": "书面表达", "type": "商务英语", "english": "Should the market conditions deteriorate further, the company reserves the right to adjust its pricing strategy without prior notice.", "chinese": "如果市场状况进一步恶化，公司保留在事先不通知的情况下调整其定价策略的权利。"}, {"id": 953, "category": "书面表达", "type": "商务英语", "english": "The consultant pointed out that the company's failure to adapt to changing market dynamics was the root cause of its declining profitability.", "chinese": "顾问指出，公司未能适应不断变化的市场动态，是其盈利能力下降的根本原因。"}, {"id": 954, "category": "书面表达", "type": "商务英语", "english": "It is generally accepted that a well-structured business plan serves as a roadmap for guiding an organization through periods of uncertainty.", "chinese": "人们普遍认为，一份结构完善的商业计划可以作为引导组织度过不确定时期的路线图。"}, {"id": 955, "category": "书面表达", "type": "商务英语", "english": "On the condition that the supplier can guarantee consistent product quality, we are prepared to enter into a long-term supply agreement.", "chinese": "在供应商能够保证产品质量始终如一的条件下，我们准备签订一份长期供应协议。"}, {"id": 956, "category": "书面表达", "type": "商务英语", "english": "The financial analyst recommended that the company reduce its debt-to-equity ratio in order to improve its credit rating and borrowing capacity.", "chinese": "财务分析师建议公司降低其债务股本比，以改善其信用评级和借款能力。"}, {"id": 957, "category": "书面表达", "type": "商务英语", "english": "Rarely has a startup achieved such rapid growth in its first year of operation, which is a testament to the strength of its business model.", "chinese": "很少有初创公司在运营的第一年就实现如此快速的增长，这证明了其商业模式的实力。"}, {"id": 958, "category": "书面表达", "type": "商务英语", "english": "The merger, subject to approval by the competition authorities, is expected to create the largest player in the European telecommunications market.", "chinese": "此次合并，在获得竞争监管机构批准的前提下，预计将打造欧洲电信市场的最大参与者。"}, {"id": 959, "category": "书面表达", "type": "商务英语", "english": "In recognition of his exemplary leadership during the crisis, the board appointed Mr. Thompson as the new Chief Operating Officer of the company.", "chinese": "为表彰他在危机期间展现的卓越领导力，董事会任命汤普森先生为公司新任首席运营官。"}, {"id": 960, "category": "书面表达", "type": "商务英语", "english": "The project manager insisted that every team member attend the mandatory safety briefing before commencing work on the construction site.", "chinese": "项目经理坚持要求每位团队成员在开始施工现场工作之前参加强制性的安全简报。"}, {"id": 961, "category": "书面表达", "type": "商务英语", "english": "The company's commitment to environmental sustainability is reflected in its decision to invest heavily in renewable energy sources.", "chinese": "公司对环境可持续发展的承诺体现在其大力投资可再生能源的决定上。"}, {"id": 962, "category": "书面表达", "type": "商务英语", "english": "Had the management taken proactive measures to address the supply chain disruptions, the impact on production would have been significantly mitigated.", "chinese": "如果管理层采取积极措施应对供应链中断，对生产的影响本可以大大减轻。"}, {"id": 963, "category": "书面表达", "type": "商务英语", "english": "The legal counsel advised that the company refrain from making any public statements until the investigation into the alleged fraud had been concluded.", "chinese": "法律顾问建议公司在针对涉嫌欺诈的调查结束之前，不要发表任何公开声明。"}, {"id": 964, "category": "书面表达", "type": "商务英语", "english": "By virtue of his extensive experience in international trade, Mr. Chen was appointed as the head of the newly created Asia-Pacific division.", "chinese": "凭借其在国际贸易方面的丰富经验，陈先生被任命为新设立的亚太区部门负责人。"}, {"id": 965, "category": "书面表达", "type": "商务英语", "english": "The annual general meeting, which was attended by over two hundred shareholders, concluded with the approval of the revised dividend policy.", "chinese": "有超过两百名股东出席的年度股东大会，以批准修订后的股息政策而结束。"}, {"id": 966, "category": "书面表达", "type": "商务英语", "english": "It is vital that the company maintain a robust internal control framework to safeguard its assets and ensure the integrity of its financial reporting.", "chinese": "公司必须保持健全的内部控制框架，以保护其资产并确保财务报告的完整性，这一点至关重要。"}, {"id": 967, "category": "书面表达", "type": "商务英语", "english": "The marketing director proposed that a dedicated task force be established to explore emerging markets in Southeast Asia and Latin America.", "chinese": "营销总监提议成立一个专门的工作组，以探索东南亚和拉丁美洲的新兴市场。"}, {"id": 968, "category": "书面表达", "type": "商务英语", "english": "In accordance with the regulatory guidelines, all listed companies are required to disclose their financial results on a quarterly basis.", "chinese": "根据监管指引，所有上市公司必须按季度披露其财务业绩。"}, {"id": 969, "category": "书面表达", "type": "商务英语", "english": "The CEO attributed the company's remarkable turnaround to the unwavering dedication of its employees and the successful implementation of the restructuring plan.", "chinese": "首席执行官将公司的显著好转归功于员工的坚定奉献和重组计划的成功实施。"}, {"id": 970, "category": "书面表达", "type": "商务英语", "english": "No sooner had the product been launched than it received widespread acclaim from industry experts and consumers alike.", "chinese": "该产品一经推出，便受到了行业专家和消费者的广泛赞誉。"}, {"id": 971, "category": "书面表达", "type": "商务英语", "english": "The company has put in place a rigorous quality assurance process to ensure that all products meet the exacting standards expected by our clients.", "chinese": "公司已建立了严格的质量保证流程，以确保所有产品都符合客户期望的严格标准。"}, {"id": 972, "category": "书面表达", "type": "商务英语", "english": "The board of directors, recognizing the need for greater transparency, approved a series of governance reforms aimed at strengthening shareholder confidence.", "chinese": "董事会认识到需要更高的透明度，批准了一系列旨在增强股东信心的治理改革措施。"}, {"id": 973, "category": "书面表达", "type": "商务英语", "english": "Were the current economic trends to persist, it is anticipated that the sector will experience a period of consolidation over the next eighteen months.", "chinese": "如果当前的经济趋势持续下去，预计该行业将在未来十八个月内经历一段整合期。"}, {"id": 974, "category": "书面表达", "type": "商务英语", "english": "The finance director requested that the budget committee allocate additional resources to the IT department for the upgrade of the company's cybersecurity infrastructure.", "chinese": "财务总监请求预算委员会为IT部门分配额外资源，用于升级公司的网络安全基础设施。"}, {"id": 975, "category": "书面表达", "type": "商务英语", "english": "In the absence of a clear regulatory framework, companies operating in the fintech sector face a considerable degree of uncertainty.", "chinese": "在缺乏明确监管框架的情况下，在金融科技领域运营的公司面临着相当大的不确定性。"}, {"id": 976, "category": "书面表达", "type": "商务英语", "english": "The report draws attention to the fact that employee engagement levels have declined significantly over the past two fiscal years.", "chinese": "报告提请大家注意，在过去两个财年中，员工敬业度水平出现了显著下降。"}, {"id": 977, "category": "书面表达", "type": "商务英语", "english": "It is incumbent upon the senior management to foster a corporate culture that values ethical conduct and promotes accountability at all levels.", "chinese": "高级管理层有责任培养一种重视道德行为并在各级促进问责制的企业文化。"}, {"id": 978, "category": "书面表达", "type": "商务英语", "english": "The company's competitive advantage stems from its ability to bring innovative products to market ahead of its rivals.", "chinese": "公司的竞争优势源于其能够比竞争对手更快地将创新产品推向市场。"}, {"id": 979, "category": "书面表达", "type": "商务英语", "english": "Not only is the proposed investment expected to yield attractive returns, but it will also create a significant number of employment opportunities in the region.", "chinese": "拟议中的投资不仅有望产生可观的回报，还将为该地区创造大量就业机会。"}, {"id": 980, "category": "书面表达", "type": "商务英语", "english": "The contract stipulates that any dispute arising between the parties shall be resolved through arbitration in accordance with the rules of the International Chamber of Commerce.", "chinese": "合同规定，双方之间产生的任何争议均应按照国际商会的规则通过仲裁解决。"}, {"id": 981, "category": "书面表达", "type": "商务英语", "english": "Having conducted a thorough analysis of the market data, the research team concluded that there was a growing demand for eco-friendly packaging solutions.", "chinese": "在深入分析了市场数据之后，研究团队得出结论：对环保包装解决方案的需求正在不断增长。"}, {"id": 982, "category": "书面表达", "type": "商务英语", "english": "The company, in conjunction with its strategic partners, has launched an initiative aimed at promoting sustainable business practices across the supply chain.", "chinese": "公司与战略合作伙伴一起，发起了一项旨在促进整个供应链可持续商业实践的倡议。"}, {"id": 983, "category": "书面表达", "type": "商务英语", "english": "It is essential that the recruitment process be conducted in a fair and transparent manner so as to attract the most qualified candidates.", "chinese": "招聘过程必须以公平和透明的方式进行，以吸引最合格的候选人，这一点至关重要。"}, {"id": 984, "category": "书面表达", "type": "商务英语", "english": "The auditor general recommended that the company strengthen its internal audit function to prevent the recurrence of the financial irregularities that were uncovered last year.", "chinese": "审计长建议公司加强其内部审计职能，以防止去年发现的财务违规行为再次发生。"}, {"id": 985, "category": "书面表达", "type": "商务英语", "english": "Under no circumstances may proprietary technology be transferred to third parties without the express written consent of the intellectual property department.", "chinese": "未经知识产权部门明确书面同意，任何情况下都不得将专有技术转让给第三方。"}, {"id": 986, "category": "书面表达", "type": "商务英语", "english": "The company's decision to outsource its customer service operations was motivated by a desire to reduce operational costs while maintaining service quality.", "chinese": "公司将客户服务业务外包的决定，其动机是在保持服务质量的同时降低运营成本。"}, {"id": 987, "category": "书面表达", "type": "商务英语", "english": "So severe was the impact of the global financial crisis that many well-established companies were forced to restructure their operations fundamentally.", "chinese": "全球金融危机的影响如此严重，以至于许多老牌公司被迫从根本上重组其运营。"}, {"id": 988, "category": "书面表达", "type": "商务英语", "english": "The terms of reference for the working group specify that its primary objective is to identify opportunities for cost reduction without compromising product quality.", "chinese": "工作组的职权范围规定，其主要目标是在不影响产品质量的前提下确定降低成本的机会。"}, {"id": 989, "category": "书面表达", "type": "商务英语", "english": "Inasmuch as the two companies share a common vision for the future of the industry, a strategic alliance between them would appear to be a logical step.", "chinese": "鉴于两家公司对该行业的未来有着共同的愿景，它们之间建立战略联盟似乎是顺理成章的一步。"}, {"id": 990, "category": "书面表达", "type": "商务英语", "english": "The project, which had been plagued by delays and cost overruns from the outset, was eventually brought to a successful conclusion under the leadership of the new project director.", "chinese": "该项目从一开始就饱受延误和成本超支的困扰，但在新任项目总监的领导下最终圆满完成。"}, {"id": 991, "category": "书面表达", "type": "商务英语", "english": "The board expressed its appreciation for the thoroughness with which the audit committee had conducted its review of the company's financial statements.", "chinese": "董事会对审计委员会审查公司财务报表的细致程度表示赞赏。"}, {"id": 992, "category": "书面表达", "type": "商务英语", "english": "Should you wish to terminate the agreement before the expiry of the contract period, a written notice of at least ninety days must be provided.", "chinese": "如果您希望在合同期满之前终止协议，必须提前至少九十天提供书面通知。"}, {"id": 993, "category": "书面表达", "type": "商务英语", "english": "The managing director stressed the importance of adhering to the highest standards of corporate governance in order to maintain the trust of investors and the public.", "chinese": "总经理强调了遵守最高公司治理标准的重要性，以维护投资者和公众的信任。"}, {"id": 994, "category": "书面表达", "type": "商务英语", "english": "It has been brought to our attention that certain invoices issued during the last quarter contain discrepancies that need to be rectified at the earliest opportunity.", "chinese": "我们注意到，上个季度开具的某些发票存在差异，需要尽快予以纠正。"}, {"id": 995, "category": "书面表达", "type": "商务英语", "english": "The company's growth strategy, which was formulated after extensive market research, focuses on expanding into high-growth emerging markets.", "chinese": "公司经过广泛的市场调研后制定的增长战略，侧重于向高增长的新兴市场扩张。"}, {"id": 996, "category": "书面表达", "type": "商务英语", "english": "For the sake of clarity, the minutes of the meeting should be distributed to all attendees within forty-eight hours of the conclusion of the proceedings.", "chinese": "为了确保清晰明了，会议纪要应在会议结束后四十八小时内分发给所有与会者。"}, {"id": 997, "category": "书面表达", "type": "商务英语", "english": "The legal team advised that the company enter into a non-disclosure agreement prior to engaging in any discussions regarding the potential acquisition.", "chinese": "法律团队建议公司在进行任何有关潜在收购的讨论之前，先签订一份保密协议。"}, {"id": 998, "category": "书面表达", "type": "商务英语", "english": "Only when all stakeholders have been consulted and their concerns adequately addressed will the management proceed with the implementation of the proposed changes.", "chinese": "只有在所有利益相关方都已被咨询且其关切得到充分回应之后，管理层才会推进拟议变更的实施。"}, {"id": 999, "category": "书面表达", "type": "商务英语", "english": "The company's commitment to excellence is evidenced by the numerous industry awards it has received over the past decade in recognition of its innovative products and services.", "chinese": "公司对卓越的承诺，从其过去十年中因创新产品和服务而获得的众多行业奖项中得到了印证。"}, {"id": 1000, "category": "书面表达", "type": "商务英语", "english": "In due course, the board will convene a special meeting to discuss the implications of the recent regulatory changes and to determine the appropriate course of action.", "chinese": "董事会将在适当时候召开特别会议，讨论近期监管变化的影响，并确定适当的行动方案。"}, {"id": 1001, "category": "工作岗位职责", "type": "商务英语", "english": "The Marketing Manager is responsible for developing and implementing marketing strategies.", "chinese": "市场经理负责制定和实施营销策略。"}, {"id": 1002, "category": "工作岗位职责", "type": "商务英语", "english": "You will be required to oversee the daily operations of the sales department.", "chinese": "您将需要监督销售部的日常运营。"}, {"id": 1003, "category": "工作岗位职责", "type": "商务英语", "english": "The successful candidate must possess excellent communication and interpersonal skills.", "chinese": "成功的候选人必须具备出色的沟通和人际交往能力。"}, {"id": 1004, "category": "工作岗位职责", "type": "商务英语", "english": "This role involves coordinating with multiple departments to ensure project success.", "chinese": "这个职位涉及与多个部门协调以确保项目成功。"}, {"id": 1005, "category": "工作岗位职责", "type": "商务英语", "english": "You will be expected to analyze market trends and identify growth opportunities.", "chinese": "您将被期望分析市场趋势并识别增长机会。"}, {"id": 1006, "category": "工作岗位职责", "type": "商务英语", "english": "The position requires that you maintain accurate records of all transactions.", "chinese": "这个职位要求您维护所有交易的准确记录。"}, {"id": 1007, "category": "工作岗位职责", "type": "商务英语", "english": "Key responsibilities include preparing financial reports and managing budgets.", "chinese": "主要职责包括准备财务报告和管理预算。"}, {"id": 1008, "category": "工作岗位职责", "type": "商务英语", "english": "You will report directly to the Chief Executive Officer on all strategic matters.", "chinese": "您将直接向首席执行官汇报所有战略事项。"}, {"id": 1009, "category": "工作岗位职责", "type": "商务英语", "english": "The role demands a high level of attention to detail and accuracy.", "chinese": "这个职位要求高度的细节关注和准确性。"}, {"id": 1010, "category": "工作岗位职责", "type": "商务英语", "english": "You will be tasked with leading a team of ten professionals.", "chinese": "您将负责领导一个由十名专业人员组成的团队。"}, {"id": 1011, "category": "工作岗位职责", "type": "商务英语", "english": "It is essential that you have prior experience in a similar capacity.", "chinese": "您必须具备类似职位的先前经验。"}, {"id": 1012, "category": "工作岗位职责", "type": "商务英语", "english": "Your duties will encompass managing client relationships and resolving complaints.", "chinese": "您的职责将包括管理客户关系和解决投诉。"}, {"id": 1013, "category": "工作岗位职责", "type": "商务英语", "english": "The successful applicant will be required to travel internationally on a regular basis.", "chinese": "成功的申请人将被要求定期国际出差。"}, {"id": 1014, "category": "工作岗位职责", "type": "商务英语", "english": "You must be able to work independently as well as part of a team.", "chinese": "您必须能够独立工作以及作为团队的一员。"}, {"id": 1015, "category": "工作岗位职责", "type": "商务英语", "english": "This position calls for someone who can thrive in a fast-paced environment.", "chinese": "这个职位需要能够在快节奏环境中茁壮成长的人。"}, {"id": 1016, "category": "工作岗位职责", "type": "商务英语", "english": "You will be responsible for ensuring compliance with all relevant regulations.", "chinese": "您将负责确保遵守所有相关法规。"}, {"id": 1017, "category": "工作岗位职责", "type": "商务英语", "english": "The job entails working closely with senior management on strategic initiatives.", "chinese": "这份工作涉及与高级管理层密切合作开展战略计划。"}, {"id": 1018, "category": "工作岗位职责", "type": "商务英语", "english": "You are expected to meet or exceed quarterly sales targets consistently.", "chinese": "您被期望持续达到或超越季度销售目标。"}, {"id": 1019, "category": "工作岗位职责", "type": "商务英语", "english": "Key duties involve conducting market research and competitor analysis.", "chinese": "主要职责涉及进行市场研究和竞争对手分析。"}, {"id": 1020, "category": "工作岗位职责", "type": "商务英语", "english": "The role requires that you possess strong analytical and problem-solving abilities.", "chinese": "这个职位要求您具备强大的分析和解决问题能力。"}, {"id": 1021, "category": "工作岗位职责", "type": "商务英语", "english": "You will serve as the primary point of contact for key accounts.", "chinese": "您将作为关键客户的主要联系人。"}, {"id": 1022, "category": "工作岗位职责", "type": "商务英语", "english": "It is imperative that you maintain confidentiality at all times.", "chinese": "您必须始终保守机密。"}, {"id": 1023, "category": "工作岗位职责", "type": "商务英语", "english": "Your responsibilities will extend to training and mentoring junior staff members.", "chinese": "您的职责将扩展到培训和指导初级员工。"}, {"id": 1024, "category": "工作岗位职责", "type": "商务英语", "english": "The position necessitates frequent interaction with external stakeholders.", "chinese": "这个职位需要与外部利益相关者频繁互动。"}, {"id": 1025, "category": "工作岗位职责", "type": "商务英语", "english": "You will be accountable for the overall performance of your department.", "chinese": "您将对您部门的整体绩效负责。"}, {"id": 1026, "category": "工作岗位职责", "type": "商务英语", "english": "This role involves making critical decisions under pressure.", "chinese": "这个职位涉及在压力下做出关键决策。"}, {"id": 1027, "category": "工作岗位职责", "type": "商务英语", "english": "You must demonstrate the ability to manage multiple projects simultaneously.", "chinese": "您必须展示同时管理多个项目的能力。"}, {"id": 1028, "category": "工作岗位职责", "type": "商务英语", "english": "The successful candidate will oversee the recruitment and onboarding process.", "chinese": "成功的候选人将监督招聘和入职流程。"}, {"id": 1029, "category": "工作岗位职责", "type": "商务英语", "english": "It is crucial that you stay updated on industry developments and best practices.", "chinese": "您必须及时了解行业发展和最佳实践。"}, {"id": 1030, "category": "工作岗位职责", "type": "商务英语", "english": "Your role will include negotiating contracts with suppliers and vendors.", "chinese": "您的角色将包括与供应商和供应商谈判合同。"}, {"id": 1031, "category": "工作岗位职责", "type": "商务英语", "english": "You will be required to prepare and deliver presentations to senior executives.", "chinese": "您将被要求准备并向高级主管进行演示。"}, {"id": 1032, "category": "工作岗位职责", "type": "商务英语", "english": "The job specification calls for a minimum of five years relevant experience.", "chinese": "职位要求至少五年相关经验。"}, {"id": 1033, "category": "工作岗位职责", "type": "商务英语", "english": "You are responsible for monitoring and evaluating team performance metrics.", "chinese": "您负责监控和评估团队绩效指标。"}, {"id": 1034, "category": "工作岗位职责", "type": "商务英语", "english": "This position requires proficiency in Microsoft Office and CRM software.", "chinese": "这个职位要求熟练使用微软办公软件和CRM软件。"}, {"id": 1035, "category": "工作岗位职责", "type": "商务英语", "english": "You will liaise with the IT department to implement new systems.", "chinese": "您将与IT部门联络以实施新系统。"}, {"id": 1036, "category": "工作岗位职责", "type": "商务英语", "english": "It is expected that you contribute ideas for process improvement.", "chinese": "期望您为流程改进贡献想法。"}, {"id": 1037, "category": "工作岗位职责", "type": "商务英语", "english": "The role encompasses developing and maintaining standard operating procedures.", "chinese": "这个角色包括制定和维护标准操作程序。"}, {"id": 1038, "category": "工作岗位职责", "type": "商务英语", "english": "You must have the capacity to handle sensitive and confidential information.", "chinese": "您必须有能力处理敏感和机密信息。"}, {"id": 1039, "category": "工作岗位职责", "type": "商务英语", "english": "Your duties will involve preparing proposals and responding to tenders.", "chinese": "您的职责将涉及准备提案和回应招标。"}, {"id": 1040, "category": "工作岗位职责", "type": "商务英语", "english": "The position demands excellent organizational and time management skills.", "chinese": "这个职位要求出色的组织和时间管理技能。"}, {"id": 1041, "category": "工作岗位职责", "type": "商务英语", "english": "You will be tasked with identifying cost-saving opportunities across the organization.", "chinese": "您将负责识别整个组织的节省成本机会。"}, {"id": 1042, "category": "工作岗位职责", "type": "商务英语", "english": "It is vital that you establish and maintain professional relationships.", "chinese": "建立和维护专业关系至关重要。"}, {"id": 1043, "category": "工作岗位职责", "type": "商务英语", "english": "The successful applicant will coordinate cross-functional project teams.", "chinese": "成功的申请人将协调跨职能项目团队。"}, {"id": 1044, "category": "工作岗位职责", "type": "商务英语", "english": "You are required to adhere to company policies and procedures at all times.", "chinese": "您必须始终遵守公司政策和程序。"}, {"id": 1045, "category": "工作岗位职责", "type": "商务英语", "english": "This role involves representing the company at industry conferences and events.", "chinese": "这个职位涉及在行业会议和活动中代表公司。"}, {"id": 1046, "category": "工作岗位职责", "type": "商务英语", "english": "You will manage the department budget and ensure cost-effective operations.", "chinese": "您将管理部门预算并确保成本效益运营。"}, {"id": 1047, "category": "工作岗位职责", "type": "商务英语", "english": "The job requires that you possess strong leadership and delegation skills.", "chinese": "这份工作要求您具备强大的领导和授权技能。"}, {"id": 1048, "category": "工作岗位职责", "type": "商务英语", "english": "You must be capable of working to tight deadlines and under pressure.", "chinese": "您必须能够在紧迫的截止日期和压力下工作。"}, {"id": 1049, "category": "工作岗位职责", "type": "商务英语", "english": "Your responsibilities include conducting performance reviews and providing feedback.", "chinese": "您的职责包括进行绩效评估和提供反馈。"}, {"id": 1050, "category": "工作岗位职责", "type": "商务英语", "english": "The position involves collaborating with international partners and clients.", "chinese": "这个职位涉及与国际合作伙伴和客户合作。"}, {"id": 1051, "category": "工作岗位职责", "type": "商务英语", "english": "You will be expected to drive innovation and continuous improvement initiatives.", "chinese": "您将被期望推动创新和持续改进 ssential that you demonstrate innovation leadership and entrepreneurship.", "chinese": "您必须展示创新领导力和创业精神。"}, {"id": 1194, "category": "工作岗位职责", "type": "商务英语", "english": "This position involves managing investor relations and shareholder communications.", "chinese": "这个职位涉及管理投资者关系和股东沟通。"}, {"id": 1195, "category": "工作岗位职责", "type": "商务英语", "english": "You will be tasked with developing succession planning strategies.", "chinese": "您将负责制定继任计划策略。"}, {"id": 1196, "category": "工作岗位职责", "type": "商务英语", "english": "The role demands experience in digital strategy and technology leadership.", "chinese": "这个角色需要数字战略和技术领导经验。"}, {"id": 1197, "category": "工作岗位职责", "type": "商务英语", "english": "You must maintain the highest standards of professional conduct.", "chinese": "您必须保持最高的专业行为标准。"}, {"id": 1198, "category": "工作岗位职责", "type": "商务英语", "english": "It is crucial that you build resilient and adaptive organizations.", "chinese": "建立有韧性和适应性的组织至关重要。"}, {"id": 1199, "category": "工作岗位职责", "type": "商务英语", "english": "Your duties include overseeing quality management and Six Sigma initiatives.", "chinese": "您的职责包括监督质量管理和六西格玛计划。"}, {"id": 1200, "category": "工作岗位职责", "type": "商务英语", "english": "The successful candidate will shape the future direction of the organization.", "chinese": "成功的候选人将塑造组织的未来方向。"}, {"id": 1201, "category": "社交与闲聊", "type": "日常口语", "english": "I've been looking forward to catching up with you for ages!", "chinese": "我盼着和你叙旧好久了！"}, {"id": 1202, "category": "社交与闲聊", "type": "日常口语", "english": "We ended up going to the party even though we hadn't been invited.", "chinese": "我们最终还是去了那个派对，尽管我们并没有被邀请。"}, {"id": 1203, "category": "社交与闲聊", "type": "日常口语", "english": "She's the kind of person who always looks on the bright side of things.", "chinese": "她是那种总是往好处想的人。"}, {"id": 1204, "category": "社交与闲聊", "type": "日常口语", "english": "I can't figure out why he turned down such a generous offer.", "chinese": "我搞不懂他为什么会拒绝这么慷慨的提议。"}, {"id": 1205, "category": "社交与闲聊", "type": "日常口语", "english": "If I had known you were coming, I would have cleaned up the house.", "chinese": "如果我知道你要来，我就会把房子收拾干净了。"}, {"id": 1206, "category": "社交与闲聊", "type": "日常口语", "english": "They've been going out with each other since they were in college.", "chinese": "他们从大学起就开始交往了。"}, {"id": 1207, "category": "社交与闲聊", "type": "日常口语", "english": "It's not easy to bring up sensitive topics in a casual conversation.", "chinese": "在闲聊中提起敏感话题并不容易。"}, {"id": 1208, "category": "社交与闲聊", "type": "日常口语", "english": "The meeting was called off because the manager came down with the flu.", "chinese": "会议被取消了，因为经理得了流感。"}, {"id": 1209, "category": "社交与闲聊", "type": "日常口语", "english": "I ran into an old friend of mine at the supermarket yesterday.", "chinese": "我昨天在超市碰到了一位老朋友。"}, {"id": 1210, "category": "社交与闲聊", "type": "日常口语", "english": "She takes after her mother in terms of her sense of humor.", "chinese": "她在幽默感方面随她妈妈。"}, {"id": 1211, "category": "社交与闲聊", "type": "日常口语", "english": "We need to come up with a better plan before the deadline.", "chinese": "我们需要在截止日期前想出一个更好的方案。"}, {"id": 1212, "category": "社交与闲聊", "type": "日常口语", "english": "He's been putting off that difficult conversation for weeks.", "chinese": "他把那次艰难的谈话拖了好几个星期了。"}, {"id": 1213, "category": "社交与闲聊", "type": "日常口语", "english": "I'll get back to you as soon as I've looked into the matter.", "chinese": "我一调查完这件事就给你回复。"}, {"id": 1214, "category": "社交与闲聊", "type": "日常口语", "english": "The project was handed over to a new team after the previous leader left.", "chinese": "前任领导离开后，项目被移交给了新团队。"}, {"id": 1215, "category": "社交与闲聊", "type": "日常口语", "english": "She made up her mind to quit her job and travel around the world.", "chinese": "她下定决心辞职去环游世界。"}, {"id": 1216, "category": "社交与闲聊", "type": "日常口语", "english": "I didn't mean to let you down when I forgot about our appointment.", "chinese": "我忘了我们的约定，不是故意让你失望的。"}, {"id": 1217, "category": "社交与闲聊", "type": "日常口语", "english": "He's always showing off his new car whenever we hang out together.", "chinese": "每次我们一起出去玩，他总是在炫耀他的新车。"}, {"id": 1218, "category": "社交与闲聊", "type": "日常口语", "english": "We should keep in touch even after we move to different cities.", "chinese": "即使搬到不同的城市，我们也应该保持联系。"}, {"id": 1219, "category": "社交与闲聊", "type": "日常口语", "english": "The party was a great success, thanks to the people who chipped in.", "chinese": "多亏了那些出力帮忙的人，派对非常成功。"}, {"id": 1220, "category": "社交与闲聊", "type": "日常口语", "english": "I've never come across anyone who speaks as many languages as she does.", "chinese": "我从未遇到过像她那样会说这么多语言的人。"}, {"id": 1221, "category": "社交与闲聊", "type": "日常口语", "english": "She broke the news to us gently so that we wouldn't be too upset.", "chinese": "她委婉地把消息告诉了我们，以免我们太难过。"}, {"id": 1222, "category": "社交与闲聊", "type": "日常口语", "english": "If you carry on like this, you're going to burn out before you know it.", "chinese": "如果你继续这样下去，不知不觉就会精疲力竭的。"}, {"id": 1223, "category": "社交与闲聊", "type": "日常口语", "english": "He tried to make a good impression on his girlfriend's parents.", "chinese": "他努力给女朋友的父母留下好印象。"}, {"id": 1224, "category": "社交与闲聊", "type": "日常口语", "english": "I'm really looking forward to the weekend when I can finally wind down.", "chinese": "我真的很期待周末，到时候终于可以放松一下了。"}, {"id": 1225, "category": "社交与闲聊", "type": "日常口语", "english": "She pointed out that we had been making the same mistake over and over.", "chinese": "她指出我们一直在犯同样的错误。"}, {"id": 1226, "category": "社交与闲聊", "type": "日常口语", "english": "The book that you recommended to me has sold more than a million copies.", "chinese": "你推荐给我的那本书已经卖了一百多万册。"}, {"id": 1227, "category": "社交与闲聊", "type": "日常口语", "english": "I wish I had taken your advice when you told me to save more money.", "chinese": "我真希望当初你让我多存钱的时候我听了你的建议。"}, {"id": 1228, "category": "社交与闲聊", "type": "日常口语", "english": "We had a great time catching up on each other's lives over coffee.", "chinese": "我们一边喝咖啡一边聊彼此的近况，非常开心。"}, {"id": 1229, "category": "社交与闲聊", "type": "日常口语", "english": "He's been known to go out of his way to help people in need.", "chinese": "大家都知道他会不遗余力地帮助有需要的人。"}, {"id": 1230, "category": "社交与闲聊", "type": "日常口语", "english": "I can't put up with his constant complaining anymore.", "chinese": "我再也受不了他不停地抱怨了。"}, {"id": 1231, "category": "社交与闲聊", "type": "日常口语", "english": "She dropped by my place unexpectedly on her way home from work.", "chinese": "她下班回家的路上出乎意料地顺道来了我家。"}, {"id": 1232, "category": "社交与闲聊", "type": "日常口语", "english": "The issue was brought up during the meeting but wasn't resolved.", "chinese": "这个问题在会议上被提出来了，但并没有得到解决。"}, {"id": 1233, "category": "社交与闲聊", "type": "日常口语", "english": "I've always looked up to my grandfather because of his wisdom and patience.", "chinese": "我一直很敬仰我的爷爷，因为他的智慧和耐心。"}, {"id": 1234, "category": "社交与闲聊", "type": "日常口语", "english": "If I were in your shoes, I would accept the offer without hesitation.", "chinese": "如果我是你，我会毫不犹豫地接受这个提议。"}, {"id": 1235, "category": "社交与闲聊", "type": "日常口语", "english": "We need to work out the details before we can move forward.", "chinese": "在继续推进之前，我们需要把细节敲定。"}, {"id": 1236, "category": "社交与闲聊", "type": "日常口语", "english": "She's been trying to track down the person who stole her wallet.", "chinese": "她一直在设法找到偷她钱包的人。"}, {"id": 1237, "category": "社交与闲聊", "type": "日常口语", "english": "He turned out to be much more interesting than I had expected.", "chinese": "结果他比我预想的有趣得多。"}, {"id": 1238, "category": "社交与闲聊", "type": "日常口语", "english": "I'm used to getting up early since I started my new job.", "chinese": "自从开始新工作以来，我已经习惯了早起。"}, {"id": 1239, "category": "社交与闲聊", "type": "日常口语", "english": "The restaurant that was recommended by my colleague has been shut down.", "chinese": "我同事推荐的那家餐厅已经关门了。"}, {"id": 1240, "category": "社交与闲聊", "type": "日常口语", "english": "She couldn't help but laugh when she heard the hilarious joke.", "chinese": "她听到那个笑话时忍不住笑了。"}, {"id": 1241, "category": "社交与闲聊", "type": "日常口语", "english": "We should take advantage of the nice weather and go for a walk.", "chinese": "我们应该趁着天气好出去散散步。"}, {"id": 1242, "category": "社交与闲聊", "type": "日常口语", "english": "He's been working around the clock to finish the project on time.", "chinese": "他一直在没日没夜地工作，以便按时完成项目。"}, {"id": 1243, "category": "社交与闲聊", "type": "日常口语", "english": "I didn't catch what you said because the music was too loud.", "chinese": "我没听清你说什么，因为音乐太大了。"}, {"id": 1244, "category": "社交与闲聊", "type": "日常口语", "english": "She's always finding fault with everything I do, which is really frustrating.", "chinese": "她总是对我做的每件事挑毛病，真的很让人沮丧。"}, {"id": 1245, "category": "社交与闲聊", "type": "日常口语", "english": "If it hadn't been for your help, I would have never made it through that tough time.", "chinese": "如果不是你的帮助，我绝对熬不过那段艰难时期。"}, {"id": 1246, "category": "社交与闲聊", "type": "日常口语", "english": "He tends to beat around the bush instead of getting straight to the point.", "chinese": "他总是绕弯子，而不是直奔主题。"}, {"id": 1247, "category": "社交与闲聊", "type": "日常口语", "english": "I've been meaning to ask you how your new job is working out.", "chinese": "我一直想问问你新工作怎么样。"}, {"id": 1248, "category": "社交与闲聊", "type": "日常口语", "english": "The plan fell through because the funding was pulled at the last minute.", "chinese": "计划泡汤了，因为资金在最后一刻被撤了。"}, {"id": 1249, "category": "社交与闲聊", "type": "日常口语", "english": "She stood me up again, which made me wonder if she really cares about our friendship.", "chinese": "她又放我鸽子了，这让我怀疑她是否真的在乎我们的友谊。"}, {"id": 1250, "category": "社交与闲聊", "type": "日常口语", "english": "We got along really well from the moment we first met at the conference.", "chinese": "从我们在会议上第一次见面起，我们就相处得非常好。"}, {"id": 1251, "category": "社交与闲聊", "type": "日常口语", "english": "I'd rather stay at home than go out in this terrible weather.", "chinese": "我宁愿待在家里也不愿在这种恶劣天气出门。"}, {"id": 1252, "category": "社交与闲聊", "type": "日常口语", "english": "He's been under a lot of pressure since he was promoted to manager.", "chinese": "自从升为经理以来，他一直承受着很大的压力。"}, {"id": 1253, "category": "社交与闲聊", "type": "日常口语", "english": "She talked me into trying the new restaurant that just opened downtown.", "chinese": "她说服我去试试刚在市中心开的那家新餐厅。"}, {"id": 1254, "category": "社交与闲聊", "type": "日常口语", "english": "I'm afraid I can't make it to the reunion because I'll be out of town.", "chinese": "恐怕我参加不了聚会了，因为我不在城里。"}, {"id": 1255, "category": "社交与闲聊", "type": "日常口语", "english": "The gift that you gave me for my birthday is the most thoughtful one I've ever received.", "chinese": "你送我的生日礼物是我收到过的最用心的。"}, {"id": 1256, "category": "社交与闲聊", "type": "日常口语", "english": "We need to iron out a few differences before we can reach an agreement.", "chinese": "我们需要消除一些分歧才能达成协议。"}, {"id": 1257, "category": "社交与闲聊", "type": "日常口语", "english": "She's always dragging her feet when it comes to making important decisions.", "chinese": "一到做重要决定的时候，她总是拖拖拉拉。"}, {"id": 1258, "category": "社交与闲聊", "type": "日常口语", "english": "I've got used to the fact that not everyone is going to like me.", "chinese": "我已经习惯了不是每个人都会喜欢我这个事实。"}, {"id": 1259, "category": "社交与闲聊", "type": "日常口语", "english": "He was taken aback by the unexpected news that the company was being sold.", "chinese": "公司要被出售的意外消息让他大吃一惊。"}, {"id": 1260, "category": "社交与闲聊", "type": "日常口语", "english": "If you don't stand up for yourself, people will keep walking all over you.", "chinese": "如果你不为自己挺身而出，别人就会一直欺负你。"}, {"id": 1261, "category": "社交与闲聊", "type": "日常口语", "english": "We hit it off right away and have been close friends ever since.", "chinese": "我们一见如故，从那以后就成了好朋友。"}, {"id": 1262, "category": "社交与闲聊", "type": "日常口语", "english": "I can't wrap my head around why she would say something like that.", "chinese": "我无法理解她为什么会说出那样的话。"}, {"id": 1263, "category": "社交与闲聊", "type": "日常口语", "english": "She's been going through a rough patch lately, so we should cut her some slack.", "chinese": "她最近过得不太好，所以我们应该对她宽容一些。"}, {"id": 1264, "category": "社交与闲聊", "type": "日常口语", "english": "The movie that we watched last night was much better than I had anticipated.", "chinese": "我们昨晚看的那部电影比我预期的要好得多。"}, {"id": 1265, "category": "社交与闲聊", "type": "日常口语", "english": "I was about to give up when I finally got through to customer service.", "chinese": "我正要放弃的时候，终于接通了客服电话。"}, {"id": 1266, "category": "社交与闲聊", "type": "日常口语", "english": "He let the cat out of the bag about the surprise party we were planning.", "chinese": "他泄露了我们正在筹备的惊喜派对。"}, {"id": 1267, "category": "社交与闲聊", "type": "日常口语", "english": "We should touch base before the meeting to make sure we're on the same page.", "chinese": "我们应该在会议前沟通一下，确保我们的想法一致。"}, {"id": 1268, "category": "社交与闲聊", "type": "日常口语", "english": "I've been trying to cut down on the amount of time I spend on social media.", "chinese": "我一直在努力减少花在社交媒体上的时间。"}, {"id": 1269, "category": "社交与闲聊", "type": "日常口语", "english": "She brushed off my suggestion as if it wasn't worth considering.", "chinese": "她对我的建议不屑一顾，好像不值得考虑一样。"}, {"id": 1270, "category": "社交与闲聊", "type": "日常口语", "english": "If I had more free time, I would pick up a new hobby like painting or photography.", "chinese": "如果我有更多空闲时间，我会培养一个像画画或摄影的新爱好。"}, {"id": 1271, "category": "社交与闲聊", "type": "日常口语", "english": "He's always cracking jokes, which is one of the things I like most about him.", "chinese": "他总是讲笑话，这是我最喜欢他的地方之一。"}, {"id": 1272, "category": "社交与闲聊", "type": "日常口语", "english": "I need to make up for the time I lost while I was recovering from my illness.", "chinese": "我需要弥补生病期间损失的时间。"}, {"id": 1273, "category": "社交与闲聊", "type": "日常口语", "english": "The conversation drifted from one topic to another without any clear direction.", "chinese": "对话漫无目的地从一个话题跳到另一个话题。"}, {"id": 1274, "category": "社交与闲聊", "type": "日常口语", "english": "She's been dying to tell you the exciting news she heard yesterday.", "chinese": "她一直迫不及待地想告诉你她昨天听到的那个好消息。"}, {"id": 1275, "category": "社交与闲聊", "type": "日常口语", "english": "We were taken by surprise when the host announced that dinner was ready.", "chinese": "主人宣布晚餐准备好了的时候，我们感到很惊喜。"}, {"id": 1276, "category": "社交与闲聊", "type": "日常口语", "english": "I'd appreciate it if you could keep this between you and me for now.", "chinese": "如果你能暂时保密，我会非常感激。"}, {"id": 1277, "category": "社交与闲聊", "type": "日常口语", "english": "He went out on a limb to support me when nobody else would.", "chinese": "当没有其他人愿意支持我时，他冒险站了出来。"}, {"id": 1278, "category": "社交与闲聊", "type": "日常口语", "english": "The more I get to know her, the more I realize how talented she is.", "chinese": "我越了解她，就越意识到她多么有才华。"}, {"id": 1279, "category": "社交与闲聊", "type": "日常口语", "english": "I've been putting a lot of thought into what I want to do with my life.", "chinese": "我一直在认真思考我的人生方向。"}, {"id": 1280, "category": "社交与闲聊", "type": "日常口语", "english": "She couldn't hold back her tears when she heard the touching speech.", "chinese": "听到那场感人的演讲时，她忍不住流下了眼泪。"}, {"id": 1281, "category": "社交与闲聊", "type": "日常口语", "english": "We should hang out more often instead of just texting each other.", "chinese": "我们应该多见面，而不是只发短信聊天。"}, {"id": 1282, "category": "社交与闲聊", "type": "日常口语", "english": "If I had arrived five minutes earlier, I would have caught the bus.", "chinese": "如果我早到五分钟，就能赶上那趟公交了。"}, {"id": 1283, "category": "社交与闲聊", "type": "日常口语", "english": "He's been trying to patch things up with his brother after their big argument.", "chinese": "大吵一架之后，他一直在努力和哥哥和好。"}, {"id": 1284, "category": "社交与闲聊", "type": "日常口语", "english": "I'm not sure how to break the ice with people I've just met.", "chinese": "我不太确定该如何和刚认识的人打破僵局。"}, {"id": 1285, "category": "社交与闲聊", "type": "日常口语", "english": "The project that was supposed to be completed last month is still being worked on.", "chinese": "本应上个月完成的项目还在进行中。"}, {"id": 1286, "category": "社交与闲聊", "type": "日常口语", "english": "She has a way of making everyone feel welcome wherever she goes.", "chinese": "她有一种走到哪里都能让每个人感到受欢迎的本事。"}, {"id": 1287, "category": "社交与闲聊", "type": "日常口语", "english": "I've been told that the new manager is much easier to get along with.", "chinese": "我听说新经理比以前的好相处多了。"}, {"id": 1288, "category": "社交与闲聊", "type": "日常口语", "english": "We need to clear the air before things get any worse between us.", "chinese": "我们需要在关系进一步恶化之前把话说清楚。"}, {"id": 1289, "category": "社交与闲聊", "type": "日常口语", "english": "He offered to put me up for the night since it was too late to travel.", "chinese": "因为太晚了不好赶路，他主动让我在他家过夜。"}, {"id": 1290, "category": "社交与闲聊", "type": "日常口语", "english": "I was blown away by how much the city has changed since my last visit.", "chinese": "这座城市自上次我来之后变化之大让我惊叹不已。"}, {"id": 1291, "category": "社交与闲聊", "type": "日常口语", "english": "If she doesn't show up on time, we'll have to start the meeting without her.", "chinese": "如果她不按时到，我们就只能不等她开始开会了。"}, {"id": 1292, "category": "社交与闲聊", "type": "日常口语", "english": "They've been going back and forth on this issue for weeks without reaching a conclusion.", "chinese": "他们在这个问题上反复讨论了好几个星期，还是没有结论。"}, {"id": 1293, "category": "社交与闲聊", "type": "日常口语", "english": "I ran out of things to say after we had exhausted all the small talk topics.", "chinese": "在聊完了所有闲聊话题后，我不知道该说什么了。"}, {"id": 1294, "category": "社交与闲聊", "type": "日常口语", "english": "She opened up to me about her struggles, which made me feel closer to her.", "chinese": "她向我倾诉了她的困境，这让我觉得和她更亲近了。"}, {"id": 1295, "category": "社交与闲聊", "type": "日常口语", "english": "The friend who I traveled with last summer has moved to another country.", "chinese": "去年夏天和我一起旅行的朋友已经搬到另一个国家了。"}, {"id": 1296, "category": "社交与闲聊", "type": "日常口语", "english": "I can't believe how quickly time has flown by since we last saw each other.", "chinese": "真不敢相信自从上次见面以来时间过得这么快。"}, {"id": 1297, "category": "社交与闲聊", "type": "日常口语", "english": "He tried to play it cool, but everyone could tell he was nervous.", "chinese": "他试图装作若无其事，但每个人都能看出他很紧张。"}, {"id": 1298, "category": "社交与闲聊", "type": "日常口语", "english": "We should make the most of this opportunity before it slips away.", "chinese": "我们应该充分利用这个机会，免得它溜走。"}, {"id": 1299, "category": "社交与闲聊", "type": "日常口语", "english": "I've never been one to hold a grudge, so I forgave him right away.", "chinese": "我从来不是记仇的人，所以我立刻就原谅了他。"}, {"id": 1300, "category": "社交与闲聊", "type": "日常口语", "english": "The best conversations I've had are the ones that come up spontaneously.", "chinese": "我经历过的最好的对话都是那些自然而然聊起来的。"}, {"id": 1301, "category": "购物与消费", "type": "日常口语", "english": "I've been meaning to check out that new store that opened last week.", "chinese": "我一直想去看看上周开的那家新店。"}, {"id": 1302, "category": "购物与消费", "type": "日常口语", "english": "The dress that I tried on was marked down from $200 to $80.", "chinese": "我试穿的那条裙子从200美元降价到了80美元。"}, {"id": 1303, "category": "购物与消费", "type": "日常口语", "english": "If I had known the sale was going on, I would have bought more items.", "chinese": "如果我知道在打折，我就会多买一些东西了。"}, {"id": 1304, "category": "购物与消费", "type": "日常口语", "english": "She spent a fortune on shoes that she'll probably never wear.", "chinese": "她花了一大笔钱买了些可能永远不会穿的鞋。"}, {"id": 1305, "category": "购物与消费", "type": "日常口语", "english": "I can't afford to splurge on luxury brands right now because I'm saving up for a house.", "chinese": "我现在买不起奢侈品牌，因为我正在攒钱买房。"}, {"id": 1306, "category": "购物与消费", "type": "日常口语", "english": "The cashier pointed out that I could get a discount if I signed up for a membership.", "chinese": "收银员提醒我如果注册会员可以享受折扣。"}, {"id": 1307, "category": "购物与消费", "type": "日常口语", "english": "We ended up buying more things than we had planned because everything was on sale.", "chinese": "我们最终买的东西比计划的多，因为所有东西都在打折。"}, {"id": 1308, "category": "购物与消费", "type": "日常口语", "english": "I'm trying to cut back on impulse purchases so I can stick to my budget.", "chinese": "我正在努力减少冲动消费，以便控制预算。"}, {"id": 1309, "category": "购物与消费", "type": "日常口语", "english": "The product that was advertised online turned out to be completely different from what I received.", "chinese": "网上宣传的产品和我收到的完全不一样。"}, {"id": 1310, "category": "购物与消费", "type": "日常口语", "english": "She's been hunting for a bargain at every store she visits.", "chinese": "她每到一家店都在寻找便宜货。"}, {"id": 1311, "category": "购物与消费", "type": "日常口语", "english": "I asked the sales assistant to ring up the items separately so I could use two different coupons.", "chinese": "我让售货员分开结账，这样我就能使用两张不同的优惠券。"}, {"id": 1312, "category": "购物与消费", "type": "日常口语", "english": "The jacket that I bought online has to be returned because it doesn't fit properly.", "chinese": "我在网上买的那件夹克得退了，因为不太合身。"}, {"id": 1313, "category": "购物与消费", "type": "日常口语", "english": "If you shop around a bit, you'll find a much better deal than this.", "chinese": "如果你多逛逛，会找到比这好得多的价格。"}, {"id": 1314, "category": "购物与消费", "type": "日常口语", "english": "He's always been good at talking shop owners into giving him extra discounts.", "chinese": "他一直很擅长说服店主给他额外的折扣。"}, {"id": 1315, "category": "购物与消费", "type": "日常口语", "english": "I've been saving up for months to buy the laptop that I've had my eye on.", "chinese": "我已经攒了好几个月的钱，想买我看中的那台笔记本电脑。"}, {"id": 1316, "category": "购物与消费", "type": "日常口语", "english": "The store that used to be on this corner was shut down last year.", "chinese": "以前在这个角落的那家店去年关门了。"}, {"id": 1317, "category": "购物与消费", "type": "日常口语", "english": "She couldn't make up her mind between the red one and the blue one.", "chinese": "她在红色的和蓝色的之间犹豫不决。"}, {"id": 1318, "category": "购物与消费", "type": "日常口语", "english": "I was ripped off by a taxi driver who charged me triple the normal fare.", "chinese": "我被一个出租车司机宰了，他收了我三倍的车费。"}, {"id": 1319, "category": "购物与消费", "type": "日常口语", "english": "The receipt shows that you were overcharged by $15, so you should ask for a refund.", "chinese": "收据显示你被多收了15美元，所以你应该要求退款。"}, {"id": 1320, "category": "购物与消费", "type": "日常口语", "english": "We need to stock up on groceries before the holiday weekend begins.", "chinese": "我们需要在假日周末开始前囤好日用品。"}, {"id": 1321, "category": "购物与消费", "type": "日常口语", "english": "I've never come across such a wide selection of products at such low prices.", "chinese": "我从未见过这么丰富的产品种类配上这么低的价格。"}, {"id": 1322, "category": "购物与消费", "type": "日常口语", "english": "She handed over her credit card before I could even tell her the total price.", "chinese": "我还没来得及告诉她总价，她就把信用卡递过来了。"}, {"id": 1323, "category": "购物与消费", "type": "日常口语", "english": "The items that are displayed in the window are meant to draw customers in.", "chinese": "橱窗里展示的商品是为了吸引顾客进店。"}, {"id": 1324, "category": "购物与消费", "type": "日常口语", "english": "If I were you, I'd hold off on buying that phone until the new model comes out.", "chinese": "如果我是你，我会等到新机型出来再买那部手机。"}, {"id": 1325, "category": "购物与消费", "type": "日常口语", "english": "I've gotten into the habit of comparing prices online before making any purchase.", "chinese": "我已经养成了在购买任何东西之前先在网上比价的习惯。"}, {"id": 1326, "category": "购物与消费", "type": "日常口语", "english": "The shop assistant went out of her way to help me find the right size.", "chinese": "售货员不厌其烦地帮我找到了合适的尺码。"}, {"id": 1327, "category": "购物与消费", "type": "日常口语", "english": "We were told that the product would be delivered within three business days.", "chinese": "我们被告知产品会在三个工作日内送达。"}, {"id": 1328, "category": "购物与消费", "type": "日常口语", "english": "She set aside a portion of her salary every month for her shopping budget.", "chinese": "她每个月都会留出一部分工资作为购物预算。"}, {"id": 1329, "category": "购物与消费", "type": "日常口语", "english": "I wish I hadn't thrown away the receipt because now I can't return this defective item.", "chinese": "我真希望没有把收据扔掉，因为现在我无法退这个有瑕疵的商品了。"}, {"id": 1330, "category": "购物与消费", "type": "日常口语", "english": "The online store that I usually order from has been hacked, so I need to change my password.", "chinese": "我通常下单的那家网店被黑了，所以我需要修改密码。"}, {"id": 1331, "category": "购物与消费", "type": "日常口语", "english": "He tried to pass off a fake brand-name watch as the real thing.", "chinese": "他试图把一块假名牌手表冒充真货。"}, {"id": 1332, "category": "购物与消费", "type": "日常口语", "english": "I'm looking for a gift that won't break the bank but still looks elegant.", "chinese": "我在找一个不会让我破费但又看起来很精致的礼物。"}, {"id": 1333, "category": "购物与消费", "type": "日常口语", "english": "The more I shop online, the more I realize how convenient it is compared to going to stores.", "chinese": "我在网上购物越多，就越意识到比去实体店方便得多。"}, {"id": 1334, "category": "购物与消费", "type": "日常口语", "english": "She's been keeping track of all her expenses in a spreadsheet to see where her money goes.", "chinese": "她一直在用电子表格记录所有开销，看看钱都花到哪里去了。"}, {"id": 1335, "category": "购物与消费", "type": "日常口语", "english": "If you use this promo code, you'll get an extra ten percent off your entire purchase.", "chinese": "如果你使用这个促销代码，整个订单可以额外打九折。"}, {"id": 1336, "category": "购物与消费", "type": "日常口语", "english": "The product was sold out within hours after it was put up for sale online.", "chinese": "这个产品在网上开售后几小时内就卖光了。"}, {"id": 1337, "category": "购物与消费", "type": "日常口语", "english": "I can't figure out why my credit card was declined when I tried to make the payment.", "chinese": "我搞不懂为什么我尝试付款时信用卡被拒了。"}, {"id": 1338, "category": "购物与消费", "type": "日常口语", "english": "She came across a rare vintage handbag at a flea market and bought it for a song.", "chinese": "她在跳蚤市场发现了一个罕见的复古手提包，而且几乎是白捡的。"}, {"id": 1339, "category": "购物与消费", "type": "日常口语", "english": "We need to take the defective product back to the store and ask for a replacement.", "chinese": "我们需要把这个有缺陷的产品拿回商店要求换货。"}, {"id": 1340, "category": "购物与消费", "type": "日常口语", "english": "The advertisement that I saw on TV made the product look much better than it actually is.", "chinese": "我在电视上看到的广告让那个产品看起来比实际好得多。"}, {"id": 1341, "category": "购物与消费", "type": "日常口语", "english": "I've been putting off going to the mall because I know I'll end up spending too much.", "chinese": "我一直拖着不去商场，因为我知道去了肯定会花太多钱。"}, {"id": 1342, "category": "购物与消费", "type": "日常口语", "english": "He talked me into buying the extended warranty, which turned out to be a waste of money.", "chinese": "他说服我买了延长保修，结果发现是浪费钱。"}, {"id": 1343, "category": "购物与消费", "type": "日常口语", "english": "The store offers free shipping on orders that are over fifty dollars.", "chinese": "这家店对超过50美元的订单提供免费送货。"}, {"id": 1344, "category": "购物与消费", "type": "日常口语", "english": "If I had read the reviews before purchasing, I wouldn't have bought this terrible product.", "chinese": "如果我在购买前看了评论，就不会买这个糟糕的产品了。"}, {"id": 1345, "category": "购物与消费", "type": "日常口语", "english": "She's always on the lookout for clearance sales where she can find great bargains.", "chinese": "她总是在留意清仓大甩卖，那里能找到很划算的东西。"}, {"id": 1346, "category": "购物与消费", "type": "日常口语", "english": "I asked the store to wrap the gift up nicely so I could give it directly to my friend.", "chinese": "我请商店把礼物包装得漂亮一些，这样我可以直接送给朋友。"}, {"id": 1347, "category": "购物与消费", "type": "日常口语", "english": "The price of this item has gone up significantly since it was first released.", "chinese": "这个商品的价格自首次发布以来大幅上涨了。"}, {"id": 1348, "category": "购物与消费", "type": "日常口语", "english": "We were taken in by the flashy advertising and ended up regretting our purchase.", "chinese": "我们被花哨的广告骗了，最终对购买感到后悔。"}, {"id": 1349, "category": "购物与消费", "type": "日常口语", "english": "I'd like to try this on before I buy it to make sure it fits well.", "chinese": "我想在买之前试穿一下，确保合身。"}, {"id": 1350, "category": "购物与消费", "type": "日常口语", "english": "The customer who was ahead of me in line was arguing with the cashier about a price discrepancy.", "chinese": "排在我前面的那位顾客正在和收银员争论价格差异。"}, {"id": 1351, "category": "购物与消费", "type": "日常口语", "english": "She's been browsing through online catalogs for hours but hasn't made up her mind yet.", "chinese": "她已经浏览了好几个小时的网络目录，但还没有下定决心。"}, {"id": 1352, "category": "购物与消费", "type": "日常口语", "english": "If you're not satisfied with the product, you can bring it back within thirty days for a full refund.", "chinese": "如果你对产品不满意，可以在30天内退货获得全额退款。"}, {"id": 1353, "category": "购物与消费", "type": "日常口语", "english": "I managed to snag the last item on the shelf before anyone else could grab it.", "chinese": "我在别人抢到之前成功拿到了货架上的最后一件商品。"}, {"id": 1354, "category": "购物与消费", "type": "日常口语", "english": "The store has run out of stock on the item that I wanted to buy.", "chinese": "商店里我想买的那件商品已经缺货了。"}, {"id": 1355, "category": "购物与消费", "type": "日常口语", "english": "He's been trying to live within his means ever since he got into debt.", "chinese": "自从他负债以来，他一直努力量入为出。"}, {"id": 1356, "category": "购物与消费", "type": "日常口语", "english": "I wish I had waited for the Black Friday sale instead of buying it at full price.", "chinese": "我真希望我等到了黑色星期五大促再买，而不是全价购买。"}, {"id": 1357, "category": "购物与消费", "type": "日常口语", "english": "The quality of this product is far superior to the one that I bought last year.", "chinese": "这个产品的质量比我去年买的那个好得多。"}, {"id": 1358, "category": "购物与消费", "type": "日常口语", "english": "She went on a shopping spree and maxed out three credit cards in one weekend.", "chinese": "她疯狂购物，一个周末就刷爆了三张信用卡。"}, {"id": 1359, "category": "购物与消费", "type": "日常口语", "english": "I've been looking all over for a pair of shoes that are both comfortable and stylish.", "chinese": "我到处在找一双既舒适又时尚的鞋子。"}, {"id": 1360, "category": "购物与消费", "type": "日常口语", "english": "The salesman tried to talk me into buying a more expensive model, but I stood my ground.", "chinese": "推销员试图说服我买更贵的型号，但我坚持了自己的立场。"}, {"id": 1361, "category": "购物与消费", "type": "日常口语", "english": "If you sign up for their loyalty program, you'll earn points every time you make a purchase.", "chinese": "如果你注册他们的会员计划，每次购物都能积分。"}, {"id": 1362, "category": "购物与消费", "type": "日常口语", "english": "The package that I ordered still hasn't arrived even though it's been two weeks.", "chinese": "我订购的包裹已经两个星期了还没到。"}, {"id": 1363, "category": "购物与消费", "type": "日常口语", "english": "I need to set aside some money for emergencies instead of spending it all on clothes.", "chinese": "我需要留一些钱应急，而不是全花在衣服上。"}, {"id": 1364, "category": "购物与消费", "type": "日常口语", "english": "She was thrilled to find out that the coat she wanted was being offered at half price.", "chinese": "她兴奋地发现她想要的那件大衣正在半价出售。"}, {"id": 1365, "category": "购物与消费", "type": "日常口语", "english": "The online reviews that I read before buying were overwhelmingly positive.", "chinese": "我购买前看的那些在线评价绝大多数都是正面的。"}, {"id": 1366, "category": "购物与消费", "type": "日常口语", "english": "We should check the expiration date before we buy these dairy products.", "chinese": "我们在买这些乳制品之前应该检查一下保质期。"}, {"id": 1367, "category": "购物与消费", "type": "日常口语", "english": "I've been meaning to ask you where you got that amazing bag you were carrying yesterday.", "chinese": "我一直想问你昨天背的那个漂亮的包是在哪里买的。"}, {"id": 1368, "category": "购物与消费", "type": "日常口语", "english": "If I had paid with cash instead of a credit card, I wouldn't have overspent.", "chinese": "如果我付现金而不是刷信用卡，就不会超支了。"}, {"id": 1369, "category": "购物与消费", "type": "日常口语", "english": "The store that just opened across the street is having a grand opening sale this weekend.", "chinese": "街对面刚开的那家店这周末正在举行开业大促销。"}, {"id": 1370, "category": "购物与消费", "type": "日常口语", "english": "She couldn't pass up such a great deal, even though she didn't really need the item.", "chinese": "即使她并不是真的需要那个东西，她也无法拒绝这么好的价格。"}, {"id": 1371, "category": "购物与消费", "type": "日常口语", "english": "I always make a shopping list before I go to the supermarket so I don't end up buying unnecessary things.", "chinese": "我去超市之前总是列好购物清单，这样就不会买不必要的东西。"}, {"id": 1372, "category": "购物与消费", "type": "日常口语", "english": "The product was recalled because it was found to contain harmful substances.", "chinese": "这个产品被召回是因为被发现含有有害物质。"}, {"id": 1373, "category": "购物与消费", "type": "日常口语", "english": "He's been saving up for a down payment on a house for the past three years.", "chinese": "过去三年他一直在为首付攒钱。"}, {"id": 1374, "category": "购物与消费", "type": "日常口语", "english": "I wish I could take back the purchase I made yesterday because I found a cheaper option online.", "chinese": "我真希望能撤销昨天的购买，因为我在网上找到了更便宜的选项。"}, {"id": 1375, "category": "购物与消费", "type": "日常口语", "english": "The store clerk was kind enough to point me in the right direction when I was looking for the electronics section.", "chinese": "当我在找电子产品区时，店员很热心地给我指了路。"}, {"id": 1376, "category": "购物与消费", "type": "日常口语", "english": "If you buy in bulk, you can get a s
